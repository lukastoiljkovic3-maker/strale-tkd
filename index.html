function toggleNote(id){
  const area=document.getElementById('note-'+id);
  if(!area)return;
  const opening=!area.classList.contains('open');
  if(opening){openNotes.add(id);area.classList.add('open');setTimeout(()=>area.querySelector('textarea').focus(),30);}
  else{openNotes.delete(id);area.classList.remove('open');}
}

async function saveLeadNote(id,notes){
  const lead=cachedLeads.find(l=>l.id===id);
  if(!lead)return;
  const val=notes.trim();
  if(lead.notes===val||(lead.notes==null&&val===''))return;
  const oldNote=lead.notes||null;
  lead.notes=val||null;
  await sb.from('ghl_leads').update({notes:val||null}).eq('id',id);
  logActivity(id,'note',oldNote,val||null);
  const btn=document.getElementById('nb-'+id);
  const span=document.getElementById('nbt-'+id);
  if(btn)btn.classList.toggle('has-note',Boolean(val));
  if(span)span.textContent=val?(val.length>50?val.substring(0,50)+'…':val):'Dodaj belešku';
}

async function updateLeadFollowUp(id,date){
  const lead=cachedLeads.find(l=>l.id===id);
  if(!lead)return;
  const oldDate=lead.follow_up_date||null;
  lead.follow_up_date=date||null;
  await sb.from('ghl_leads').update({follow_up_date:date||null}).eq('id',id);
  logActivity(id,'followup',oldDate,date||null);
  setLocalLastActivity(id, 'followup', date||null, oldDate);
  refreshLeadRows();
}

function updateLeadFollowUpPanel(id,date,input){
  updateLeadFollowUp(id,date);
  const btn=input.closest('.ldp-fu-btn');
  if(!btn)return;
  const txt=btn.querySelector('.ldp-fu-text');
  if(!txt)return;
  if(date){
    const d=new Date(date+'T00:00');
    txt.textContent=d.toLocaleDateString('sr-RS',{day:'numeric',month:'long',year:'numeric'});
    txt.className='ldp-fu-text has-date';
  } else {
    txt.textContent='Postavi datum';
    txt.className='ldp-fu-text';
  }
}

async function assignLead(id,member){
  const lead=cachedLeads.find(l=>l.id===id);
  if(!lead)return;
  const oldVal=lead.assigned_to||null;
  const newVal=lead.assigned_to===member?null:member;
  const {error}=await sb.from('ghl_leads').update({assigned_to:newVal}).eq('id',id);
  if(!error){lead.assigned_to=newVal;renderLeads(cachedLeads);logActivity(id,'assign',oldVal,newVal);}
}

async function updateLeadStatus(id,status){
  const lead=cachedLeads.find(l=>l.id===id);
  const oldStatus=lead?(lead.status||'Novi'):null;
  if (oldStatus === status) return;  // no-op
  const {error}=await sb.from('ghl_leads').update({status}).eq('id',id);
  if(!error){
    if(lead){
      lead.status=status;
      setLocalLastActivity(id, 'status', status, oldStatus);
      // Partial updates only — keep panel buttons in place
      refreshLeadRows();
      if (currentLeadId === id) {
        updatePanelStatusButtons(status);
        setTimeout(() => renderLeadActivityInto('ldpActivityList', id), 80);
      }
    }
    logActivity(id,'status',oldStatus,status);
    pushStatusToGHL(id, oldStatus, status);
  }
}

// Map tracker status to GHL tags. Each status maps to a single tag;
// switching status removes the old tag and adds the new one.
const STATUS_TAG_MAP = {
  'Novi':      'tracker-novi',
  'Follow Up': 'tracker-followup',
  'Closed':    'tracker-closed',
  'DQ':        'tracker-dq',
};
async function pushStatusToGHL(contactId, oldStatus, newStatus){
  if (!contactId || oldStatus === newStatus) return;
  const removeTag = STATUS_TAG_MAP[oldStatus];
  const addTag    = STATUS_TAG_MAP[newStatus];
  const payload = { contactId };
  if (addTag)    payload.addTags    = [addTag];
  if (removeTag && removeTag !== addTag) payload.removeTags = [removeTag];
  if (!payload.addTags && !payload.removeTags) return;
  try {
    await fetch('/api/ghl-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (e) { /* non-fatal */ }
}

async function updateLeadDeal(id,deal){
  const lead=cachedLeads.find(l=>l.id===id);
  const oldDeal=lead?(lead.deal||null):null;
  const {error}=await sb.from('ghl_leads').update({deal:deal||null}).eq('id',id);
  if(!error){
    if(lead){lead.deal=deal||null;renderLeads(cachedLeads);
    logActivity(id,'deal',oldDeal,deal||null);}
  }
}

async function updateLeadDealValue(id,val){
  const lead=cachedLeads.find(l=>l.id===id);
  const num = val==='' || val==null ? null : Number(val);
  if (num!=null && (isNaN(num) || num<0)) return;
  const oldVal = lead ? (lead.deal_value!=null ? lead.deal_value : null) : null;
  const {error}=await sb.from('ghl_leads').update({deal_value:num}).eq('id',id);
  if(!error){
    if(lead){lead.deal_value=num;renderLeads(cachedLeads);}
    logActivity(id,'deal_value',oldVal!=null?'€'+oldVal:null,num!=null?'€'+num:null);
  }
}

/* ── GOOGLE SHEETS REVENUE ── */
const SHEET_ID='';

/* ─────────────────── SHEET → CRM CLOSED SYNC ──────────────────────
 * Reads the Google Sheet (source of truth for closed deals) and
 * marks each matching ghl_leads row as status='Closed'. Match by
 * email first, then by exact (case-insensitive) name fallback.
 * Bonus: if the sheet row has a closer, assign the lead to that
 * rep if it's still unassigned. Runs silently every time the
 * Metrics tab or revenue section is loaded.
 * ─────────────────────────────────────────────────────────────── */
const CLOSER_TO_MEMBER = {
  'mateja': 'mateja',
  'dusica': 'dusica',
  'dušica': 'dusica',
};
function _normLow(s){ return (s||'').toString().trim().toLowerCase(); }
function _normName(s){
  return _normLow(s).normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ');
}
function _challengeToDeal(amount){
  // Strale deal type (CPA / funded) is set manually, not derived from the € amount.
  return null;
}

let _sheetSyncRunning = false;
let _sheetSyncLastRun = 0;

async function syncClosedFromSheet(opts = {}){
  // Throttle: don't run more than once every 30s unless forced
  if (_sheetSyncRunning) return null;
  if (!opts.force && Date.now() - _sheetSyncLastRun < 30000) return null;
  _sheetSyncRunning = true;
  try {
    let sheet;
    try { sheet = await fetchSheetData(); }
    catch (e) { return { error: 'Ne mogu da učitam Sheet: '+e.message }; }
    if (!sheet || !sheet.length) return { matched: 0, updated: 0 };

    const emails = [...new Set(sheet.map(r => _normLow(r.email)).filter(Boolean))];
    const names  = [...new Set(sheet.map(r => r.name).filter(Boolean))];

    // Fetch potential matches by email + by exact name
    const fetched = [];
    if (emails.length) {
      const { data } = await sb.from('ghl_leads')
        .select('id,name,email,status,deal,assigned_to')
        .in('email', emails);
      if (data) fetched.push(...data);
    }
    if (names.length) {
      const { data } = await sb.from('ghl_leads')
        .select('id,name,email,status,deal,assigned_to')
        .in('name', names);
      if (data) fetched.push(...data);
    }
    // Dedupe by id
    const byId = new Map();
    fetched.forEach(c => byId.set(c.id, c));
    const candidates = [...byId.values()];

    // Build lookup indexes
    const byEmail = new Map();
    const byName  = new Map();
    candidates.forEach(c => {
      if (c.email) byEmail.set(_normLow(c.email), c);
      if (c.name)  byName.set(_normName(c.name), c);
    });

    const updates = [];
    let matchCount = 0;
    for (const row of sheet) {
      const e = _normLow(row.email);
      const n = _normName(row.name);
      const match = (e && byEmail.get(e)) || (n && byName.get(n));
      if (!match) continue;
      matchCount++;
      const patch = {};
      if (match.status !== 'Closed') patch.status = 'Closed';
      const dealKey = _challengeToDeal(row.challenge);
      if (dealKey && !match.deal) patch.deal = dealKey;
      const closer = CLOSER_TO_MEMBER[_normLow(row.closer)];
      if (closer && !match.assigned_to) patch.assigned_to = closer;
      if (!Object.keys(patch).length) continue;
      updates.push({
        id: match.id, patch,
        oldStatus: match.status || 'Novi',
        oldDeal:   match.deal || null,
        oldAssign: match.assigned_to || null,
      });
    }

    if (!updates.length) return { matched: matchCount, updated: 0 };

    // Apply updates + activity log entries
    for (const u of updates) {
      const { error } = await sb.from('ghl_leads').update(u.patch).eq('id', u.id);
      if (error) { console.error('Sheet→CRM update error:', error); continue; }
      if (u.patch.status && u.patch.status !== u.oldStatus) {
        logActivity(u.id, 'status', u.oldStatus, u.patch.status);
      }
      if (u.patch.deal && u.patch.deal !== u.oldDeal) {
        logActivity(u.id, 'deal', u.oldDeal, u.patch.deal);
      }
      if (u.patch.assigned_to && u.patch.assigned_to !== u.oldAssign) {
        logActivity(u.id, 'assign', u.oldAssign, u.patch.assigned_to);
      }
      // Refresh cached lead if loaded
      const cached = (cachedLeads||[]).find(l => l.id === u.id);
      if (cached) Object.assign(cached, u.patch);
    }
    return { matched: matchCount, updated: updates.length };
  } finally {
    _sheetSyncRunning = false;
    _sheetSyncLastRun = Date.now();
  }
}

/* ─────────────────── AUTO ROUND-ROBIN ASSIGNMENT ──────────────────
 * Fairly distributes unassigned tracker-relevant leads between
 * Mateja and Dušica. Whoever has fewer open leads (status not in
 * Closed/DQ) gets the next one. Activity log records each.
 * ─────────────────────────────────────────────────────────────── */
async function autoAssignUnassigned(){
  // Single closer (Mateja): claim every unassigned, open, qualified lead.
  const { data, error } = await sb.from('ghl_leads')
    .select('id,date_added,tags,status')
    .is('assigned_to', null)
    .neq('status','Closed').neq('status','DQ')
    .overlaps('tags', ['straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus','booked-call'])
    .order('date_added', { ascending: true })
    .limit(500);
  if (error || !data || !data.length) return { assigned: 0 };

  let assignedM = 0;
  for (const lead of data) {
    const { error: upErr } = await sb.from('ghl_leads').update({ assigned_to: 'mateja' }).eq('id', lead.id);
    if (upErr) continue;
    logActivity(lead.id, 'assign', null, 'mateja');
    assignedM++;
    const cached = (cachedLeads||[]).find(l => l.id === lead.id);
    if (cached) cached.assigned_to = 'mateja';
  }
  return { assigned: assignedM, mateja: assignedM };
}

async function fetchSheetData(){
  // Revenue/clients now come straight from GHL opportunities via /api/ghl-metrics,
  // mapped to the same {name,challenge,email,date,closer,status} shape the UI used
  // for the old Google Sheet. status: 'polozeno' = won · 'u toku' = open pipeline.
  const res=await fetch('/api/ghl-metrics');
  if(!res.ok) throw new Error(`API HTTP ${res.status}`);
  const json=await res.json();
  if(json.error) throw new Error(json.error);
  return (json.rows||[]).filter(r=>r.name);
}

function parseGvizDate(d){
  if(!d)return '';
  const m=String(d).match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m) return new Date(+m[1],+m[2],+m[3]).toLocaleDateString('sr-RS',{day:'numeric',month:'short',year:'numeric'});
  const dt=new Date(d);
  if(!isNaN(dt.getTime())) return dt.toLocaleDateString('sr-RS',{day:'numeric',month:'short',year:'numeric'});
  return String(d);
}

            <div class="rev-kpi-lbl">Cash Collected</div>
            <div class="rev-kpi-val" style="color:var(--green)">€${cash.toLocaleString()}</div>
            <div class="rev-kpi-sub">${polozeno.length} položenih</div>
          </div>
          <div class="rev-kpi" style="border-bottom:2px solid var(--yellow)">
            <div class="rev-kpi-lbl">Pipeline</div>
            <div class="rev-kpi-val" style="color:var(--yellow)">€${pipeline.toLocaleString()}</div>
            <div class="rev-kpi-sub">${uToku.length} u toku</div>
          </div>
          <div class="rev-kpi" style="border-bottom:2px solid var(--accent)">
            <div class="rev-kpi-lbl">Rezervacije</div>
            <div class="rev-kpi-val" style="color:var(--accent)">${rezervacija.length}</div>
            <div class="rev-kpi-sub">€${rezervacija.reduce((s,r)=>s+r.challenge,0).toLocaleString()}</div>
          </div>
          <div class="rev-kpi" style="border-bottom:2px solid var(--muted2)">
            <div class="rev-kpi-lbl">Total Revenue</div>
            <div class="rev-kpi-val">€${total.toLocaleString()}</div>
            <div class="rev-kpi-sub">${rows.length} ukupno</div>
          </div>
        </div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
          <table class="rev-table">
            <thead><tr><th>Klijent</th><th>Iznos</th><th>Datum</th><th>Closer</th><th>Status</th></tr></thead>
            <tbody>${tableRows}</tbody>

}
