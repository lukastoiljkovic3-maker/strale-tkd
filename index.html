<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>STRALETKD — Sales Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="STKD Tracker" />
<meta name="theme-color" content="#070709" />
<link rel="apple-touch-icon" href="/thenewioslogov2.png" />
<link rel="apple-touch-icon" sizes="120x120" href="/thenewioslogov2.png" />
<link rel="apple-touch-icon" sizes="152x152" href="/thenewioslogov2.png" />
<link rel="apple-touch-icon" sizes="167x167" href="/thenewioslogov2.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/thenewioslogov2.png" />
<link rel="manifest" href="/manifest.json" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg:       #070709;
  --s1:       #0d0d10;
  --s2:       #131318;
  --s3:       #1a1a22;
  --b:        rgba(255,255,255,0.055);
  --b2:       rgba(255,255,255,0.10);
  --accent:   #E8720C;
  --accent2:  #FF8C2A;
  --ag:       rgba(232,114,12,0.10);
  --text:     #f0f0f4;
  --muted:    #60606c;
  --muted2:   #38383f;
  --green:    #22c55e;
  --red:      #f43f5e;
  --yellow:   #eab308;
  --mateja:   #a855f7;
  --dusica:   #f97316;
  --r:        14px;
  --font:     'Inter', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ── HEADER ─────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  height: 64px;
  background: rgba(7,7,9,0.88);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--b);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
}
.logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
.logo-img {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-img svg { width: 100%; height: 100%; }
.logo-words {}
.logo-name { font-size: 11px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: #fff; line-height: 1.1; }
.logo-sub  { font-size: 9px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

.month-nav {
  display: flex; align-items: center; gap: 0;
  background: var(--s2); border: 1px solid var(--b); border-radius: 99px;
  padding: 3px;
}
.month-nav button {
  background: none; border: none; color: var(--muted);
  cursor: pointer; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 99px; font-size: 13px; transition: all .15s;
}
.month-nav button:hover { color: var(--text); background: var(--s3); }
.month-label { font-size: 12px; font-weight: 700; min-width: 120px; text-align: center; letter-spacing: .2px; }

/* ── LAYOUT ──────────────────────────────── */
main { max-width: 1440px; margin: 0 auto; padding: 32px 40px; display: flex; flex-direction: column; gap: 24px; }

/* ── TABS ────────────────────────────────── */
.toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.tabs {
  display: flex; gap: 1px;
  background: var(--s2);
  border: 1px solid var(--b);
  border-radius: 99px;
  padding: 4px;
  box-shadow: 0 2px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04);
}
.tab {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 22px; border-radius: 99px; border: none; background: none;
  color: var(--muted); font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s; white-space: nowrap; letter-spacing: .2px;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--s3);
  color: var(--text);
  box-shadow: 0 1px 8px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.07);
}
.tab.active[data-member="mateja"] { color: var(--mateja); }
.tab.active[data-member="dusica"] { color: var(--dusica); }
[data-member="dusica"] .tab-pip { background: var(--dusica); }
.tab-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
[data-member="mateja"] .tab-pip { background: var(--mateja); }

.btn-add {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 22px; border-radius: 99px; border: none;
  background: var(--accent); color: #fff;
  font-family: var(--font); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 0 24px rgba(232,114,12,0.3);
  letter-spacing: .2px;
}
.btn-add:hover { background: var(--accent2); box-shadow: 0 0 32px rgba(232,114,12,0.45); transform: translateY(-1px); }
.btn-add svg { flex-shrink: 0; }

/* ── KPI GRID ────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 1px; background: var(--b); border: 1px solid var(--b); border-radius: var(--r); overflow: hidden; }
.kpi {
  background: var(--s1);
  padding: 28px 24px 22px;
  display: flex; flex-direction: column; gap: 0;
  position: relative; overflow: hidden;
  transition: background .2s;
}
.kpi::before {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--stripe, transparent);
}
.kpi:hover { background: var(--s2); }
.kpi-label { font-size: 9px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.kpi-val { font-size: 52px; font-weight: 900; line-height: 1; letter-spacing: -3px; color: var(--text); }
.kpi-sub { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 8px; letter-spacing: .1px; }

/* ── CONTENT GRID ────────────────────────── */
.content-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

/* ── CARD ────────────────────────────────── */
.card { background: var(--s1); border: 1px solid var(--b); border-radius: var(--r); overflow: hidden; }
.card-head {
  padding: 16px 22px; border-bottom: 1px solid var(--b);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.card-hint { font-size: 11px; color: var(--muted); font-weight: 500; }
.card-body { padding: 20px; }

/* ── CALENDAR ────────────────────────────── */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; padding: 14px; }
.cal-day-head { text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--muted); padding: 4px 0 8px; text-transform: uppercase; }
.cal-cell {
  aspect-ratio: 1; background: var(--s2); border: 1px solid var(--b);
  border-radius: 10px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s; gap: 2px; min-height: 52px;
  position: relative;
}
.cal-cell:hover { border-color: var(--b2); background: var(--s3); }
.cal-cell.empty { background: none; border-color: transparent; cursor: default; pointer-events: none; }
.cal-cell.has-data { border-color: rgba(232,114,12,.3); background: var(--ag); }
.cal-cell.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.cal-num { font-size: 12px; font-weight: 700; color: var(--muted); }
.cal-cell.has-data .cal-num, .cal-cell.today .cal-num { color: var(--text); }
.cal-cell.today .cal-num { color: var(--accent); }
.cal-calls { font-size: 10px; font-weight: 600; color: var(--accent); }
.cal-close { font-size: 10px; font-weight: 700; color: var(--green); }

/* ── CHART ───────────────────────────────── */
.chart-wrap { padding: 14px 14px 10px; height: 216px; position: relative; }

/* ── SIDE PANEL ──────────────────────────── */
.side-panel { display: flex; flex-direction: column; gap: 16px; }

/* ── MEMBER CARD ─────────────────────────── */
.mc { background: var(--s1); border: 1px solid var(--b); border-radius: var(--r); padding: 22px; }
.mc-head { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.mc-av {
  width: 50px; height: 50px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #fff; flex-shrink: 0;
  position: relative; overflow: hidden;
}
.mc-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.mc-av.mateja { box-shadow: 0 0 0 2px rgba(168,85,247,.45), 0 0 20px rgba(168,85,247,.2); }
.mc-av.dusica { box-shadow: 0 0 0 2px rgba(249,115,22,.45), 0 0 20px rgba(249,115,22,.2); }
.mc-name { font-size: 18px; font-weight: 900; line-height: 1.1; letter-spacing: -.3px; }
.mc-role { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
.mc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mc-stat { background: var(--s2); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--b); }
.mc-stat-lbl { font-size: 9px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.mc-stat-val { font-size: 32px; font-weight: 900; margin-top: 4px; letter-spacing: -1.5px; line-height: 1; }

/* ── PROGRESS ────────────────────────────── */
.prog { margin-top: 18px; }
.prog-lbl { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 7px; font-weight: 600; letter-spacing: .5px; }
.prog-track { height: 3px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* ── LOG TABLE ───────────────────────────── */
.log-table { width: 100%; border-collapse: collapse; }
.log-table th {
  text-align: left; font-size: 9px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted);
  padding: 12px 16px; border-bottom: 1px solid var(--b);
}
.log-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--b); color: var(--text); font-weight: 500; }
.log-table tr:last-child td { border-bottom: none; }
.log-table tbody tr { cursor: pointer; transition: background .12s; }
.log-table tbody tr:hover td { background: var(--s2); }
.pill {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: .3px;
}
.pill-g { background: rgba(34,197,94,.10); color: var(--green); }
.pill-y { background: rgba(234,179,8,.10);  color: var(--yellow); }
.pill-r { background: rgba(244,63,94,.10);  color: var(--red); }
.pill-b { background: rgba(232,114,12,.10); color: var(--accent); }

/* ── YEAR TABLE ──────────────────────────── */
.yr-table { width: 100%; border-collapse: collapse; }
.yr-table th, .yr-table td {
  padding: 10px 10px; text-align: center; font-size: 12px;
  border-bottom: 1px solid var(--b); white-space: nowrap; font-weight: 500;
}
.yr-table th { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.yr-table td:first-child { text-align: left; font-weight: 700; padding-left: 16px; }
.yr-table th:first-child { text-align: left; padding-left: 16px; }
.yr-table tr:hover td { background: var(--s2); }
.yr-cur { color: var(--accent) !important; font-weight: 800 !important; }

/* ── H2H ─────────────────────────────────── */

/* ── MODAL ───────────────────────────────── */
.btn { padding: 11px 22px; border-radius: 99px; border: none; font-family: var(--font); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; letter-spacing: .2px; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(232,114,12,.35); }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-ghost { background: var(--s2); color: var(--muted); border: 1px solid var(--b); }
.btn-ghost:hover { color: var(--text); }
.btn-del { background: rgba(244,63,94,.08); color: var(--red); border: 1px solid rgba(244,63,94,.18); margin-right: auto; }
.btn-del:hover { background: rgba(244,63,94,.16); }

/* ── LEADS — WORLD CLASS ─────────────────── */

/* Sub-tab nav */
.leads-type-nav { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; }
.ltn-btn {
  display:flex; align-items:center; gap:10px; flex:1; min-width:160px;
  padding:16px 20px; border-radius:14px; border:1px solid var(--b);
  background:var(--s1); font-family:var(--font); font-size:13px; font-weight:700;
  cursor:pointer; color:var(--muted); transition:all .18s; touch-action:manipulation;
  position:relative; overflow:hidden;
}
.ltn-btn:hover { border-color:var(--b2); color:var(--text); background:var(--s2); }
.ltn-icon { font-size:18px; flex-shrink:0; }
.ltn-info { display:flex; flex-direction:column; gap:2px; flex:1; text-align:left; }
.ltn-label { font-size:12px; font-weight:700; letter-spacing:.2px; }
.ltn-sublabel { font-size:10px; font-weight:500; color:var(--muted); }
.ltn-count {
  font-size:22px; font-weight:900; line-height:1; letter-spacing:-1px;
  margin-left:auto; flex-shrink:0;
}
.ltn-stripe {
  position:absolute; bottom:0; left:0; right:0; height:2px;
}

.ltn-active-q  { border-color:rgba(232,114,12,.35); background:rgba(232,114,12,.07); color:#E8720C; }
.ltn-active-q  .ltn-count { color:#E8720C; }
.ltn-active-q  .ltn-sublabel { color:rgba(232,114,12,.6); }
.ltn-active-dq { border-color:rgba(244,63,94,.35);  background:rgba(244,63,94,.07);  color:var(--red); }
.ltn-active-dq .ltn-count { color:var(--red); }
.ltn-active-dq .ltn-sublabel { color:rgba(244,63,94,.6); }
.ltn-active-lm { border-color:rgba(234,179,8,.35);  background:rgba(234,179,8,.07);  color:var(--yellow); }
.ltn-active-lm .ltn-count { color:var(--yellow); }
.ltn-active-lm .ltn-sublabel { color:rgba(234,179,8,.6); }

@media (max-width:640px) {
  .leads-type-nav { gap:8px; }
  .ltn-btn { min-width:calc(50% - 4px); flex:unset; padding:14px 16px; }
  .ltn-count { font-size:18px; }
}

/* Search bar */
.leads-search-wrap { position:relative; flex:1; min-width:200px; max-width:340px; }
.leads-search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none; }
.leads-search {
  width:100%; padding:8px 12px 8px 36px; border-radius:99px;
  border:1px solid var(--b); background:var(--s2); color:var(--text);
  font-family:var(--font); font-size:12px; font-weight:500; outline:none;
  transition:border-color .15s, box-shadow .25s ease-out, background .15s;
}
.leads-search::placeholder { color:var(--muted); }
.leads-search:focus { border-color:rgba(232,114,12,.5); background:var(--s3);
  box-shadow:0 0 0 3px rgba(232,114,12,.12), 0 0 24px rgba(232,114,12,.22); }
@media (max-width:640px){ .leads-search { font-size:16px; } }  /* iOS: prevent focus-zoom */

/* Follow-up date on card */
.lc-fu-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
.lc-fu-lbl { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); flex-shrink:0; }
.lc-fu-input {
  flex:1; padding:6px 10px; border-radius:8px; border:1px solid var(--b);
  background:var(--s2); color:var(--text); font-family:var(--font);
  font-size:11px; font-weight:600; outline:none; cursor:pointer;
  transition:border-color .15s; touch-action:manipulation;
  color-scheme: dark;
}
.lc-fu-input:focus { border-color:var(--yellow); }
.lc-fu-input.fu-today { border-color:rgba(234,179,8,.4); background:rgba(234,179,8,.07); color:var(--yellow); }
.lc-fu-input.fu-overdue { border-color:rgba(244,63,94,.4); background:rgba(244,63,94,.07); color:var(--red); }

/* Today's follow-ups banner */
.fu-today-banner {
  display:flex; align-items:center; gap:12px; margin-bottom:20px;
  padding:14px 18px; border-radius:12px;
  background:rgba(234,179,8,.08); border:1px solid rgba(234,179,8,.25);
  transition: background .15s, border-color .15s, transform .08s;
}
.fu-today-banner:hover { background:rgba(234,179,8,.13); border-color:rgba(234,179,8,.4); }
.fu-today-banner:active { transform: scale(.995); }
.fu-today-banner.active { background:rgba(234,179,8,.18); border-color:rgba(234,179,8,.6); }
.stale-banner {
  display:flex; align-items:center; gap:12px; margin-bottom:14px;
  padding:14px 18px; border-radius:12px;
  background:rgba(244,63,94,.07); border:1px solid rgba(244,63,94,.25);
  transition: background .15s, border-color .15s, transform .08s;
}
.stale-banner:hover { background:rgba(244,63,94,.12); border-color:rgba(244,63,94,.4); }
.stale-banner:active { transform: scale(.995); }
.stale-banner.active { background:rgba(244,63,94,.16); border-color:rgba(244,63,94,.6); }
.stale-banner-icon { font-size:20px; flex-shrink:0; }
.stale-banner-text { flex:1; }
.stale-banner-title { font-size:13px; font-weight:800; color:var(--red); }
.stale-banner-sub   { font-size:11px; color:var(--muted); margin-top:2px; }
.stale-banner-count { font-size:28px; font-weight:900; color:var(--red); letter-spacing:-1px; }

.dupe-banner {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px; border-radius:12px; cursor:pointer;
  background:rgba(234,179,8,.06); border:1px solid rgba(234,179,8,.22);
  transition: background .15s, border-color .15s;
}
.dupe-banner:hover { background:rgba(234,179,8,.10); border-color:rgba(234,179,8,.35); }
.dupe-banner-icon { font-size:18px; flex-shrink:0; }
.dupe-banner-text { flex:1; }
.dupe-banner-title { font-size:12px; font-weight:800; color:var(--yellow); }
.dupe-banner-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.dupe-banner-count { font-size:22px; font-weight:900; color:var(--yellow); }

.ldp-snooze-row { display:flex; gap:6px; flex-wrap:wrap; }
.ldp-snooze-btn {
  background:var(--s2); border:1px solid var(--b); color:var(--text);
  padding:8px 12px; font-size:11px; font-weight:700; border-radius:8px;
  cursor:pointer; transition:all .12s; font-family:inherit;
}
.ldp-snooze-btn:hover { border-color:var(--yellow); color:var(--yellow); }
.ldp-snooze-btn.ldp-snooze-clear:hover { border-color:var(--red); color:var(--red); }

.snooze-toggle {
  display: inline-block; padding: 6px 12px; border-radius: 99px;
  font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer;
  background: var(--s2); border: 1px solid var(--b);
  transition: all .12s;
}
.snooze-toggle:hover { color: var(--text); border-color: var(--b2); }
.fu-today-banner-icon { font-size:20px; flex-shrink:0; }
.fu-today-banner-text { flex:1; }
.fu-today-banner-title { font-size:13px; font-weight:800; color:var(--yellow); }
.fu-today-banner-sub   { font-size:11px; color:var(--muted); margin-top:2px; }
.fu-today-banner-count { font-size:28px; font-weight:900; color:var(--yellow); letter-spacing:-1px; }

/* Metrics targets */
.targets-row { display:flex; gap:1px; background:var(--b); border:1px solid var(--b); border-radius:var(--r); overflow:hidden; margin-bottom:40px; }
.target-cell { flex:1; background:var(--s1); padding:22px 24px; display:flex; flex-direction:column; gap:6px; transition:background .2s; }
.target-cell:hover { background:var(--s2); }
.target-lbl { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.target-vals { display:flex; align-items:baseline; gap:6px; }
.target-cur { font-size:42px; font-weight:900; line-height:1; letter-spacing:-2px; }
.target-of  { font-size:13px; color:var(--muted); font-weight:600; }
.target-goal { font-size:22px; font-weight:700; color:var(--muted2); letter-spacing:-1px; }
.target-prog { height:3px; background:var(--s3); border-radius:99px; overflow:hidden; margin-top:4px; }
.target-prog-fill { height:100%; border-radius:99px; transition:width .7s cubic-bezier(.4,0,.2,1); }
.target-edit { display:flex; align-items:center; gap:6px; margin-top:6px; }
.target-edit input {
  width:80px; padding:5px 8px; border-radius:8px; border:1px solid var(--b);
  background:var(--s3); color:var(--text); font-family:var(--font);
  font-size:12px; font-weight:700; outline:none; -moz-appearance:textfield;
}
.target-edit input::-webkit-outer-spin-button,
.target-edit input::-webkit-inner-spin-button { -webkit-appearance:none; }
.target-edit input:focus { border-color:var(--accent); }
.target-edit-lbl { font-size:10px; color:var(--muted); font-weight:600; }

/* Commission section */
.comm-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--b); border:1px solid var(--b); border-radius:var(--r); overflow:hidden; }
.comm-cell { background:var(--s1); padding:28px 28px; }
.comm-name { font-size:13px; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
.comm-amount { font-size:56px; font-weight:900; letter-spacing:-3px; line-height:1; margin-bottom:6px; }
.comm-sub { font-size:11px; color:var(--muted); font-weight:500; }
.comm-deals { margin-top:16px; display:flex; flex-direction:column; gap:5px; }
.comm-deal-row { display:flex; justify-content:space-between; align-items:center; font-size:11px; padding:6px 0; border-bottom:1px solid var(--b); }
.comm-deal-row:last-child { border-bottom:none; }
.comm-deal-name { color:var(--muted); font-weight:500; }
.comm-deal-val { font-weight:700; color:var(--text); }

@media (max-width:640px) {
  .leads-search-wrap { max-width:100%; }
  .comm-grid { grid-template-columns:1fr; }
  .target-cur { font-size:32px; }
  .comm-amount { font-size:40px; }
}

.leads-toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.leads-filter  { display:flex; gap:4px; flex-wrap:wrap; }

.filter-btn {
  padding:6px 15px; border-radius:99px; border:1px solid var(--b);
  background:var(--s2); color:var(--muted); font-family:var(--font);
  font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; touch-action:manipulation;
  letter-spacing:.2px;
}
.filter-btn:hover { background:var(--s3); color:var(--text); border-color:var(--b2); }
.filter-btn.active { background:rgba(232,114,12,.08); color:var(--accent); border-color:rgba(232,114,12,.25); }

.sync-btn {
  display:flex; align-items:center; gap:6px; padding:7px 16px; border-radius:99px;
  border:1px solid var(--b); background:var(--s2); color:var(--muted);
  font-family:var(--font); font-size:11px; font-weight:600; cursor:pointer;
  transition:all .15s; margin-left:auto; touch-action:manipulation;
}
.sync-btn:hover { color:var(--text); border-color:var(--b2); }
.sync-btn.spinning svg { animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── LEAD GRID ── */
.leads-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }

/* ── LEAD CARD ── */
.lead-card {
  background:var(--s1);
  border:1px solid var(--b);
  border-left:2px solid var(--lc, rgba(255,255,255,.06));
  border-radius:var(--r);
  padding:22px; gap:0;
  display:flex; flex-direction:column;
  transition:border-color .2s, transform .2s, box-shadow .2s;
  cursor:default;
}
.lead-card:hover {
  border-color:var(--b2);
  border-left-color:var(--lc, var(--accent));
  transform:translateY(-3px);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.lead-card.assigned-mateja { --lc:var(--mateja); }
.lead-card.assigned-dusica { --lc:var(--dusica); }
.lead-card.status-Closed   { --lc:var(--green); }
.lead-card.status-DQ       { --lc:var(--red); opacity:.5; }

/* Card header */
.lc-head { display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; }
.lc-av {
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:900; letter-spacing:-.5px; color:var(--text);
  background:var(--s3); border:1px solid var(--b2);
}
.lc-av.av-m { background:rgba(168,85,247,.12); color:var(--mateja); border-color:rgba(168,85,247,.25); }
.lc-av.av-d { background:rgba(249,115,22,.12); color:var(--dusica); border-color:rgba(249,115,22,.25); }
.lc-info { flex:1; min-width:0; }
.lc-name { font-size:16px; font-weight:800; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.2px; }
.lc-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-top:5px; font-size:11px; color:var(--muted); }
.lc-meta-dot { width:3px; height:3px; border-radius:50%; background:var(--muted2); flex-shrink:0; }
.lc-status {
  flex-shrink:0; display:inline-flex; align-items:center;
  padding:3px 10px; border-radius:99px;
  font-size:9px; font-weight:800; letter-spacing:.8px; text-transform:uppercase;
}
.lc-status.s-novi     { background:rgba(232,114,12,.10); color:var(--accent); }
.lc-status.s-followup { background:rgba(234,179,8,.10);  color:var(--yellow); }
.lc-status.s-closed   { background:rgba(34,197,94,.10);  color:var(--green); }
.lc-status.s-dq       { background:rgba(244,63,94,.10);  color:var(--red); }

/* Divider */
.lc-sep { height:1px; background:var(--b); margin:16px 0; }

/* Deal badge */
.lc-deal-badge {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; border-radius:10px; margin-bottom:14px;
  background:rgba(34,197,94,.06); border:1px solid rgba(34,197,94,.14);
  font-size:13px; font-weight:700; color:var(--green);
}
.lc-deal-badge strong { margin-left:auto; font-weight:900; color:#fff; font-size:14px; }

/* Fields grid */
.lc-fields { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.lc-field { min-width:0; }
.lc-field.full { grid-column:1/-1; }
.lc-fl { display:block; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.lc-fv { font-size:12px; font-weight:500; color:var(--text); line-height:1.5; }

/* Assign + status row */
.lc-actions { display:flex; gap:6px; align-items:center; margin-bottom:10px; }
.lc-assign   { display:flex; gap:5px; flex:1; }
.lc-ab {
  display:flex; align-items:center; gap:6px; justify-content:center;
  flex:1; padding:8px 10px; border-radius:99px; border:1px solid var(--b);
  background:var(--s2); font-family:var(--font); font-size:11px; font-weight:700;
  cursor:pointer; transition:all .15s; color:var(--muted); touch-action:manipulation;
  letter-spacing:.2px;
}
.lc-ab:hover { border-color:var(--b2); color:var(--text); }
.lc-ab.on-m  { background:rgba(168,85,247,.12); color:var(--mateja); border-color:rgba(168,85,247,.3); }
.lc-ab.on-d  { background:rgba(249,115,22,.12); color:var(--dusica); border-color:rgba(249,115,22,.3); }
.lc-ab img   { width:18px; height:18px; border-radius:50%; object-fit:cover; }
.lc-stsel {
  padding:8px 10px; border-radius:99px; border:1px solid var(--b);
  background:var(--s2); color:var(--text); font-family:var(--font);
  font-size:11px; font-weight:700; cursor:pointer; outline:none;
  transition:border-color .15s; touch-action:manipulation;
}
.lc-stsel:focus { border-color:var(--accent); }
.lc-stsel option { background:#1a1a22; color:#f0f0f4; }

/* Deal selector */
.lc-deal-row { margin-bottom:10px; }
.lc-deal-lbl { display:block; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.lc-deal-sel {
  width:100%; padding:8px 12px; border-radius:10px; border:1px solid var(--b);
  background:var(--s2); color:var(--text); font-family:var(--font);
  font-size:12px; font-weight:700; cursor:pointer; outline:none;
  transition:border-color .15s; touch-action:manipulation;
}
.lc-deal-sel:focus { border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.03); }
.lc-deal-sel option, .lc-deal-sel optgroup { background:#1a1a22; color:#f0f0f4; }
.lc-dealval-row { display:flex; align-items:center; gap:10px; }
.lc-dealval-lbl { font-size:12px; font-weight:600; color:var(--muted); white-space:nowrap; }
.lc-dealval-field { position:relative; flex:1; }
.lc-dealval-cur { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); font-weight:800; font-size:14px; pointer-events:none; }
.lc-dealval-input { width:100%; padding:11px 14px 11px 28px; border-radius:10px; border:1px solid var(--b);
  background:var(--s2); color:var(--green); font-family:var(--font); font-size:15px; font-weight:800; letter-spacing:-.3px; }
.lc-dealval-input:focus { border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.03); outline:none; }

/* Note button */
.lc-note-btn {
  display:flex; align-items:center; gap:7px; width:100%; padding:9px 12px;
  background:none; border:1px dashed rgba(255,255,255,.07); border-radius:10px;
  color:var(--muted); font-family:var(--font); font-size:11px; font-weight:600;
  cursor:pointer; transition:all .15s; text-align:left; touch-action:manipulation;
}
.lc-note-btn:hover { border-style:solid; border-color:var(--b2); color:var(--text); background:var(--s2); }
.lc-note-btn.has-note { border-style:solid; color:var(--yellow); border-color:rgba(234,179,8,.18); background:rgba(234,179,8,.04); }
.lc-note-btn svg { flex-shrink:0; opacity:.4; }
.lc-note-btn.has-note svg { opacity:1; }
.lc-note-btn span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.lc-note-area { display:none; margin-top:8px; }
.lc-note-area.open { display:block; }
.lc-note-input {
  width:100%; min-height:80px; background:var(--s2); border:1px solid var(--b); border-radius:10px;
  color:var(--text); font-family:var(--font); font-size:12px; font-weight:500;
  line-height:1.6; padding:10px 12px; outline:none; resize:vertical; transition:border-color .15s;
}
.lc-note-input:focus { border-color:var(--accent); }
.lc-note-input::placeholder { color:var(--muted2); }

/* Revenue section */
.rev-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--b); border:1px solid var(--b); border-radius:var(--r); overflow:hidden; margin-bottom:20px; }
.rev-kpi { background:var(--s1); padding:20px 22px; }
.rev-kpi-lbl { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.rev-kpi-val { font-size:36px; font-weight:900; letter-spacing:-2px; line-height:1; }
.rev-kpi-sub { font-size:11px; color:var(--muted); margin-top:6px; font-weight:500; }
.rev-table { width:100%; border-collapse:collapse; }
.rev-table th { text-align:left; font-size:9px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); padding:12px 16px; border-bottom:1px solid var(--b); }
.rev-table td { padding:12px 16px; font-size:13px; border-bottom:1px solid var(--b); color:var(--text); font-weight:500; }
.rev-table tr:last-child td { border-bottom:none; }
.rev-table tbody tr:hover td { background:var(--s2); }
.rev-pill { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:10px; font-weight:700; }

@media (max-width: 640px) {
  .leads-grid { grid-template-columns:1fr; }
  /* Toolbar: search + sync icon on row 1, filter chips on row 2 */
  .leads-toolbar { flex-direction:row; flex-wrap:wrap; gap:8px; align-items:center; }
  .leads-search-wrap { flex:1; order:1; max-width:none; min-width:0; }
  .leads-search { font-size:16px; padding:10px 12px 10px 36px; }
  .sync-btn { order:2; margin-left:0; width:auto; flex-shrink:0; padding:9px 11px; border-radius:10px; }
  .sync-label { display:none; }
  .leads-filter { order:3; width:100%; overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; padding-bottom:2px; gap:6px; }
  .filter-btn { flex-shrink:0; padding:7px 14px; font-size:11px; }
  .rev-kpis { grid-template-columns:repeat(2,1fr); }
  /* Table on mobile: bigger tap targets, hide Status col */
  .leads-tbl thead th { padding:12px 10px; font-size:8px; }
  .leads-tbl tbody td { padding:15px 10px; }
  .ltr-name { font-size:13px; max-width:150px; }
  .ltr-sub  { font-size:9px; max-width:150px; }
  .col-mob { display:none !important; }
  .ltr-av { width:34px; height:34px; }
}

/* ── LEADS TABLE VIEW ───────────────────── */
.leads-stat-bar {
  display: flex; gap: 1px; background: var(--b);
  border: 1px solid var(--b); border-radius: var(--r);
  overflow: hidden; margin-bottom: 20px;
}
.lsb-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 16px 10px; background: var(--s1); border: none;
  font-family: var(--font); cursor: pointer; transition: background .15s;
  touch-action: manipulation; border-bottom: 2px solid transparent;
}
.lsb-btn:hover { background: var(--s2); }
.lsb-count { font-size: 26px; font-weight: 900; line-height: 1; letter-spacing: -1.5px; color: var(--text); transition: color .15s; }
.lsb-label { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
.lsb-btn.tab-all    { border-bottom-color: transparent; }
.lsb-btn.tab-all.active    { background: var(--s2); }
.lsb-btn.tab-all.active    .lsb-count { color: #fff; }
.lsb-btn.tab-q.active      { border-bottom-color: #E8720C; background: rgba(232,114,12,.04); }
.lsb-btn.tab-q.active      .lsb-count { color: #E8720C; }
.lsb-btn.tab-dq.active     { border-bottom-color: var(--red); background: rgba(244,63,94,.04); }
.lsb-btn.tab-dq.active     .lsb-count { color: var(--red); }
.lsb-btn.tab-dq.active     { border-bottom-color: var(--red); background: rgba(244,63,94,.04); }
.lsb-btn.tab-dq.active     .lsb-count { color: var(--red); }
.lsb-btn.tab-wb.active     { border-bottom-color: #a855f7; background: rgba(168,85,247,.04); }
.lsb-btn.tab-wb.active     .lsb-count { color: #a855f7; }
.lsb-btn.tab-wa.active     { border-bottom-color: #10b981; background: rgba(16,185,129,.04); }
.lsb-btn.tab-wa.active     .lsb-count { color: #10b981; }
.lsb-btn.tab-wb2.active    { border-bottom-color: #14b8a6; background: rgba(20,184,166,.05); }
.lsb-btn.tab-wb2.active    .lsb-count { color: #14b8a6; }
.lsb-btn.tab-lm.active     { border-bottom-color: var(--yellow); background: rgba(234,179,8,.04); }
.lsb-btn.tab-lm.active     .lsb-count { color: var(--yellow); }

/* ── ADS VIEW ── */
.ads-view-btn { display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;border:1px solid var(--b);background:var(--s2);color:var(--muted);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px; }
.ads-view-btn.active { border-color:var(--accent);background:rgba(232,114,12,.1);color:var(--accent); }
.smart-btn {
  padding:7px 14px; border-radius:99px;
  border:1px solid rgba(168,85,247,.35); background:rgba(168,85,247,.06);
  color:var(--mateja); font-family:var(--font); font-size:11px; font-weight:700;
  cursor:pointer; transition:all .2s; letter-spacing:.3px;
  display:flex; align-items:center; gap:4px;
}
.smart-btn:hover { background:rgba(168,85,247,.14); border-color:rgba(168,85,247,.6); }
.smart-btn.active { background:rgba(168,85,247,.22); color:#d8b4fe; border-color:rgba(168,85,247,.7); }

/* ── AI SUMMARY ─────────────────────── */
.ai-summary-host {
  background: linear-gradient(135deg, rgba(168,85,247,.07), rgba(168,85,247,.02));
  border: 1px solid rgba(168,85,247,.25);
  border-radius: 12px;
  padding: 12px 14px;
  min-height: 38px;
}
.ai-summary-text {
  font-size: 13px; line-height: 1.5; color: var(--text); font-weight: 500;
}
.ai-summary-foot {
  display:flex; justify-content:space-between; align-items:center;
  margin-top: 10px; padding-top: 8px; border-top: 1px dashed rgba(168,85,247,.18);
}
.ai-gen-btn {
  background: linear-gradient(135deg, rgba(168,85,247,.4), rgba(147,51,234,.4));
  border: 1px solid rgba(168,85,247,.5); color: #fff;
  padding: 9px 14px; border-radius: 9px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: .3px;
  transition: all .15s; display:flex; align-items:center; gap:6px;
}
.ai-gen-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(168,85,247,.3); }
.ai-regen-btn {
  background: transparent; border: 1px solid rgba(168,85,247,.3);
  color: var(--mateja); padding: 4px 9px; border-radius: 6px;
  cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 700;
}
.ai-regen-btn:hover { background: rgba(168,85,247,.1); }
.ai-spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(168,85,247,.2); border-top-color: var(--mateja);
  border-radius: 50%; animation: ai-spin .8s linear infinite;
}
@keyframes ai-spin { to { transform: rotate(360deg); } }

.tag-filter {
  padding:7px 10px;border-radius:99px;border:1px solid var(--b);
  background:var(--s2);color:var(--text);font-family:var(--font);
  font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.3px;
  max-width: 180px;
}
.tag-filter:focus { outline: none; border-color: var(--b2); }
.export-btn {
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;
  border:1px solid var(--b);background:var(--s2);color:var(--muted);
  font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;
  transition:all .2s;letter-spacing:.3px;
}
.export-btn:hover { color: var(--green); border-color: rgba(34,197,94,.4); }

.pipeline-strip {
  display:flex; gap:10px; margin: 0 0 16px 0;
}
.pipeline-cell {
  flex:1; background: var(--s2); border: 1px solid var(--b);
  border-radius: 12px; padding: 12px 16px;
  display: flex; align-items: baseline; gap: 10px; justify-content: space-between;
}
.pipeline-lbl { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.pipeline-val { font-size:20px; font-weight:900; color:var(--text); letter-spacing:-.5px; }
@media (max-width: 600px) {
  .pipeline-cell { padding: 10px 12px; }
  .pipeline-val { font-size: 16px; }
}
.ads-tbl-wrap { background:var(--s1);border:1px solid var(--b);border-radius:var(--r);overflow:hidden; }
.ads-tbl { width:100%;border-collapse:collapse; }
.ads-tbl thead th { text-align:left;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:12px 16px;border-bottom:1px solid var(--b);white-space:nowrap;background:var(--s1); }
.ads-tbl thead th.num { text-align:right; }
.ad-spend-input {
  width: 80px; padding: 5px 8px; border-radius: 7px;
  background: var(--s2); border: 1px solid var(--b); color: var(--text);
  font-family: var(--font); font-size: 12px; font-weight: 700; text-align: right;
}
.ad-spend-input:focus { outline: none; border-color: var(--b2); background: var(--s3); }
.roas-badge {
  display: inline-block; padding: 3px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 800; letter-spacing: .3px;
}
.roas-good { background: rgba(34,197,94,.14); color: var(--green); }
.roas-ok   { background: rgba(234,179,8,.14); color: var(--yellow); }
.roas-bad  { background: rgba(244,63,94,.14); color: var(--red); }
.ads-tbl tbody td { padding:11px 16px;border-bottom:1px solid var(--b);vertical-align:middle;font-size:12px; }
.ads-tbl tbody tr:last-child td { border-bottom:none; }
.ads-tbl tbody tr:hover td { background:var(--s2); }
.ads-tbl .num { text-align:right;font-weight:700; }
.ads-tbl .cam-name { font-size:12px;font-weight:700;color:var(--text);max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.ads-tbl .cam-sub { font-size:10px;color:var(--muted);margin-top:2px;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.ads-tbl .src-pill { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:var(--s3);color:var(--muted); }
.ads-tbl .src-facebook { background:rgba(232,114,12,.1);color:#60a5fa; }
.ads-tbl .src-instagram { background:rgba(168,85,247,.1);color:#c084fc; }
.ads-tbl .src-google { background:rgba(34,197,94,.1);color:#4ade80; }
.ads-bar { height:6px;border-radius:3px;background:var(--s3);overflow:hidden;min-width:60px; }
.ads-bar-fill { height:100%;border-radius:3px;background:var(--accent);transition:width .3s; }
.cvr-badge { display:inline-flex;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:800; }
.cvr-high { background:rgba(34,197,94,.12);color:var(--green); }
.cvr-mid  { background:rgba(234,179,8,.12);color:var(--yellow); }
.cvr-low  { background:rgba(244,63,94,.10);color:var(--red); }

/* Table */
.leads-tbl-wrap { background: var(--s1); border: 1px solid var(--b); border-radius: var(--r); overflow: hidden; }
.leads-tbl { width: 100%; border-collapse: collapse; }
.leads-tbl thead th {
  text-align: left; font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--muted); padding: 12px 16px; border-bottom: 1px solid var(--b);
  white-space: nowrap; background: var(--s1); position: sticky; top: 0; z-index: 1;
}
.leads-tbl tbody td { padding: 11px 14px; border-bottom: 1px solid var(--b); vertical-align: middle; }
.leads-tbl tbody tr:last-child td { border-bottom: none; }
.leads-tbl tbody tr { cursor: pointer; transition: background .1s; }
.leads-tbl tbody tr:hover td { background: var(--s2); }
.ltr-contact { display: flex; align-items: center; gap: 10px; }
.ltr-av {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; background: var(--s3); border: 1px solid var(--b2); color: var(--text);
}
.ltr-av.av-m { background: rgba(168,85,247,.12); color: var(--mateja); border-color: rgba(168,85,247,.25); }
.ltr-av.av-d { background: rgba(249,115,22,.12); color: var(--dusica); border-color: rgba(249,115,22,.25); }
.ltr-name { font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
.ltr-sub  { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
.ltr-type { display: inline-flex; padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; white-space: nowrap; }
.type-q  { background: rgba(232,114,12,.10);  color: #E8720C; }
.type-dq { background: rgba(244,63,94,.10);   color: var(--red); }
.type-wb { background: rgba(168,85,247,.10);  color: #a855f7; }
.type-wa { background: rgba(16,185,129,.10);  color: #10b981; }
.type-wb2 { background: rgba(20,184,166,.12); color: #14b8a6; }
.type-lm { background: rgba(234,179,8,.10);   color: var(--yellow); }
.heat {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;
  padding: 3px 7px; border-radius: 99px; margin-left: 6px; vertical-align: middle;
}
.heat-hot  { background: rgba(244,63,94,.13);  color: #f43f5e; }
.heat-warm { background: rgba(234,179,8,.12);  color: var(--yellow); }
.heat-cold { background: rgba(96,165,250,.10); color: #60a5fa; }

.last-action {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700; letter-spacing: .2px;
  margin-top: 5px; padding: 2px 8px; border-radius: 99px;
  background: var(--s3); color: var(--muted);
  max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.last-action.la-good { background: rgba(34,197,94,.12);  color: var(--green); }
.last-action.la-warm { background: rgba(234,179,8,.10);  color: var(--yellow); }
.last-action.la-bad  { background: rgba(244,63,94,.10);  color: var(--red); }
.last-action.la-meh  { background: rgba(96,165,250,.08); color: #60a5fa; }

/* Row flash when last_activity changes (after clicking call outcome / status / assign) */
@keyframes row-flash {
  0%   { background-color: rgba(34,197,94,.25); }
  100% { background-color: transparent; }
}
tr.row-flash > td { animation: row-flash 1.6s ease-out; }
.ltr-status-sel {
  padding: 5px 8px; border-radius: 8px; border: 1px solid var(--b);
  background: var(--s2); color: var(--text); font-family: var(--font);
  font-size: 11px; font-weight: 700; cursor: pointer; outline: none;
  transition: border-color .15s;
}
.ltr-status-sel:focus { border-color: var(--accent); }
.ltr-status-sel option { background: #1a1a22; }
.ltr-assign { display: flex; gap: 4px; }
.ltr-ab {
  width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--b);
  background: var(--s2); display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; cursor: pointer; transition: all .15s;
  color: var(--muted); font-family: var(--font);
}
.ltr-ab:hover { border-color: var(--b2); color: var(--text); }
.ltr-ab.on-m { background: rgba(168,85,247,.15); color: var(--mateja); border-color: rgba(168,85,247,.3); }
.ltr-ab.on-d { background: rgba(249,115,22,.15); color: var(--dusica); border-color: rgba(249,115,22,.3); }
.ltr-fu {
  padding: 5px 8px; border-radius: 8px; border: 1px solid var(--b);
  background: var(--s2); color: var(--text); font-family: var(--font);
  font-size: 11px; font-weight: 600; cursor: pointer; outline: none; color-scheme: dark;
  transition: border-color .15s; width: 130px;
}
.ltr-fu:focus { border-color: var(--yellow); }
.ltr-fu.fu-today   { border-color: rgba(234,179,8,.5); background: rgba(234,179,8,.08); color: var(--yellow); }
.ltr-fu.fu-overdue { border-color: rgba(244,63,94,.5); background: rgba(244,63,94,.08); color: var(--red); }
.ltr-arrow { color: var(--muted2); font-size: 16px; padding: 0 4px; }

/* Lead detail panel */
.lead-detail-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
  opacity: 0; visibility: hidden; transition: opacity .2s, visibility .2s;
}
.lead-detail-overlay.open { opacity: 1; visibility: visible; }
.lead-detail-panel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: min(460px, 100vw);
  background: var(--s1); border-left: 1px solid var(--b2);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .26s cubic-bezier(.4,0,.2,1);
}
.lead-detail-overlay.open .lead-detail-panel { transform: translateX(0); }
.ldp-head {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 20px; border-bottom: 1px solid var(--b); flex-shrink: 0;
}
.ldp-av {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; background: var(--s3); border: 1px solid var(--b2);
}
.ldp-av.av-m { background: rgba(168,85,247,.12); color: var(--mateja); border-color: rgba(168,85,247,.25); }
.ldp-av.av-d { background: rgba(249,115,22,.12); color: var(--dusica); border-color: rgba(249,115,22,.25); }
.ldp-name { font-size: 16px; font-weight: 800; letter-spacing: -.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ldp-meta { font-size: 11px; color: var(--muted); margin-top: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 100%; }
.ldp-close {
  margin-left: auto; width: 32px; height: 32px; border-radius: 99px;
  background: var(--s3); border: none; color: var(--muted); font-size: 16px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all .15s; flex-shrink: 0; touch-action: manipulation;
}
.ldp-close:hover { color: var(--text); background: var(--b2); }
.ldp-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
.ldp-sec-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted2); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--b); }
.ldp-field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ldp-field { display: flex; flex-direction: column; gap: 4px; }
.ldp-field label { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
.ldp-field span { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.5; }
.ldp-field.full { grid-column: 1/-1; }

/* Follow Up button (iOS-safe date picker) */
.ldp-fu-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  background: var(--s2); border: 1px solid var(--b);
  cursor: pointer; position: relative; overflow: hidden;
  touch-action: manipulation; width: 100%; text-align: left;
  transition: border-color .15s;
}
.ldp-fu-btn:hover { border-color: var(--b2); }
.ldp-fu-icon { font-size: 18px; flex-shrink: 0; line-height: 1; }
.ldp-fu-text { flex: 1; font-size: 13px; font-weight: 600; color: var(--muted); }
.ldp-fu-text.has-date { color: var(--text); }
.ldp-fu-text.fu-today { color: var(--yellow); }
.ldp-fu-text.fu-overdue { color: var(--red); }
.ldp-fu-chevron { color: var(--muted2); flex-shrink: 0; }
.ldp-fu-native {
  position: absolute; inset: 0; opacity: 0;
  width: 100%; height: 100%; cursor: pointer; font-size: 16px;
  z-index: 2;
}

/* Status pill buttons in detail panel */
.ldp-status-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
.ldp-st-btn {
  padding:11px 8px; border-radius:10px; border:1px solid var(--b);
  background:var(--s2); color:var(--muted); font-family:var(--font);
  font-size:12px; font-weight:700; cursor:pointer; transition:all .15s;
  touch-action:manipulation; text-align:center; letter-spacing:.2px;
}
.ldp-st-btn:hover { border-color:var(--b2); color:var(--text); }
.ldp-st-novi   { background:rgba(232,114,12,.12); color:#E8720C; border-color:rgba(232,114,12,.3); }
.ldp-st-fu     { background:rgba(234,179,8,.12); color:var(--yellow); border-color:rgba(234,179,8,.3); }
.ldp-st-closed { background:rgba(34,197,94,.12); color:var(--green); border-color:rgba(34,197,94,.3); }
.ldp-st-dq     { background:rgba(244,63,94,.12); color:var(--red); border-color:rgba(244,63,94,.3); }
/* Assign buttons in detail panel */
.ldp-assign-row { display:flex; gap:6px; }
.ldp-assign-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 14px; border-radius:10px; border:1px solid var(--b);
  background:var(--s2); color:var(--muted); font-family:var(--font);
  font-size:12px; font-weight:700; cursor:pointer; transition:all .15s;
  touch-action:manipulation;
}
.ldp-assign-btn:hover { border-color:var(--b2); color:var(--text); }
.ldp-ab-m { background:rgba(168,85,247,.12); color:var(--mateja); border-color:rgba(168,85,247,.3); }
.ldp-ab-d { background:rgba(249,115,22,.12); color:var(--dusica); border-color:rgba(249,115,22,.3); }

/* ── Mochi-style sectioned detail panel ── */
.ldp-card { background: var(--s1); border: 1px solid var(--b); border-radius: 14px; padding: 16px; }
.ldp-card .ldp-sec-lbl { margin-bottom: 12px; }
.ldp-chips { display:flex; flex-wrap:wrap; gap:6px; }
.ldp-chip { display:inline-flex; align-items:center; gap:6px; padding:7px 11px; border-radius:9px; background:var(--s3); border:1px solid var(--b); font-size:11.5px; color:var(--text); font-weight:600; text-decoration:none; max-width:100%; }
.ldp-chip span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ldp-chip svg { width:13px; height:13px; color:var(--muted); flex-shrink:0; }
.ldp-chip:hover { border-color:var(--b2); color:var(--text); }
.ldp-badges { display:flex; flex-wrap:wrap; gap:6px; margin:0 0 14px; }
.ldp-badge { display:inline-flex; align-items:center; padding:5px 10px; border-radius:99px; font-size:10px; font-weight:800; letter-spacing:.3px; text-transform:uppercase; }
.ldp-badge.b-q { background:rgba(34,197,94,.12); color:var(--green); }
.ldp-badge.b-dq { background:rgba(244,63,94,.12); color:var(--red); }
.ldp-badge.b-booked { background:rgba(56,189,248,.12); color:#38bdf8; }
.ldp-badge.b-customer { background:rgba(168,85,247,.12); color:var(--mateja); }
.ldp-subgap { margin-top:14px; }

/* collapsible sections (native <details>) */
.ldp-collap { background:var(--s1); border:1px solid var(--b); border-radius:14px; overflow:hidden; }
.ldp-collap > summary { list-style:none; cursor:pointer; display:flex; align-items:center; gap:8px; padding:15px 16px; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted2); user-select:none; }
.ldp-collap > summary::-webkit-details-marker { display:none; }
.ldp-collap > summary:hover { color:var(--muted); }
.ldp-collap .chev { margin-left:auto; transition:transform .2s; color:var(--muted2); display:flex; }
.ldp-collap[open] > summary .chev { transform:rotate(90deg); }
.ldp-collap-body { padding:0 16px 16px; }

/* appointments / booking block */
.ldp-appt { display:flex; gap:11px; padding:11px 12px; border-radius:11px; background:var(--s3); border:1px solid var(--b); align-items:center; }
.ldp-appt + .ldp-appt { margin-top:8px; }
.ldp-appt-date { display:flex; flex-direction:column; align-items:center; justify-content:center; width:46px; flex-shrink:0; border-radius:9px; background:var(--s2); border:1px solid var(--b); padding:6px 0; }
.ldp-appt-date.up { background:var(--ag); border-color:rgba(232,114,12,.3); }
.ldp-appt-date .d-dow { font-size:8px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; color:var(--muted); }
.ldp-appt-date .d-day { font-size:12px; font-weight:800; color:var(--text); text-align:center; line-height:1.2; }
.ldp-appt-date.up .d-day { color:var(--accent); }
.ldp-appt-main { flex:1; min-width:0; }
.ldp-appt-title { font-size:13px; font-weight:700; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ldp-appt-time { font-size:11px; color:var(--muted); margin-top:2px; }
.ldp-appt-loc { font-size:11px; margin-top:3px; color:var(--muted); }
.ldp-appt-loc a { color:#38bdf8; text-decoration:none; }
.ldp-appt-status { flex-shrink:0; padding:4px 9px; border-radius:99px; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.3px; }
.ldp-appt-status.a-booked { background:rgba(56,189,248,.12); color:#38bdf8; }
.ldp-appt-status.a-showed { background:rgba(34,197,94,.12); color:var(--green); }
.ldp-appt-status.a-noshow { background:rgba(244,63,94,.12); color:var(--red); }
.ldp-appt-status.a-cancel { background:var(--s2); color:var(--muted); }
.ldp-appt-empty { font-size:12px; color:var(--muted); padding:6px 2px; }

/* attribution / email key-value rows */
.ldp-kv { display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid var(--b); font-size:12px; }
.ldp-kv:last-child { border-bottom:none; }
.ldp-kv label { color:var(--muted); font-weight:600; text-transform:none; letter-spacing:0; flex-shrink:0; }
.ldp-kv span { color:var(--text); font-weight:600; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.ldp-empty { font-size:12px; color:var(--muted); }
.ldp-delete-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
  padding:12px; margin-top:4px; border-radius:11px; cursor:pointer; font-family:var(--font);
  font-size:12.5px; font-weight:700; color:var(--red);
  background:rgba(244,63,94,.07); border:1px solid rgba(244,63,94,.2); transition:all .15s; }
.ldp-delete-btn:hover { background:rgba(244,63,94,.14); border-color:rgba(244,63,94,.4); }
.ldp-delete-btn svg { width:15px; height:15px; }

@media (max-width: 640px) {
  .leads-stat-bar { flex-wrap: wrap; }
  .lsb-btn { min-width: calc(50% - 1px); padding: 12px 8px; }
  .lsb-count { font-size: 22px; }
  .col-desk { display: none !important; }
  /* Detail panel — full-screen bottom sheet */
  .lead-detail-panel {
    top: auto; width: 100%; height: 90dvh;
    border-left: none; border-top: 1px solid var(--b2); border-radius: 22px 22px 0 0;
    transform: translateY(100%);
    overflow: hidden;
  }
  .lead-detail-overlay.open .lead-detail-panel { transform: translateY(0); }
  /* Drag handle */
  .lead-detail-panel::before {
    content: ''; display: block; width: 36px; height: 4px;
    border-radius: 99px; background: var(--muted2);
    margin: 10px auto 0; flex-shrink: 0;
  }
  /* Panel header — compact, protected from overflow */
  .ldp-head { padding: 14px 16px; gap: 10px; }
  .ldp-av { width: 36px; height: 36px; font-size: 12px; }
  .ldp-name { font-size: 15px; }
  .ldp-meta { font-size: 10px; }
  .ldp-close { width: 30px; height: 30px; font-size: 14px; }
  /* Panel body */
  .ldp-body { padding: 14px 16px; gap: 14px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  .ldp-sec-lbl { font-size: 8px; margin-bottom: 8px; padding-bottom: 6px; }
  /* Status/assign buttons */
  .ldp-st-btn { padding: 14px 8px; font-size: 13px; border-radius: 12px; }
  .ldp-assign-btn { padding: 14px 12px; font-size: 13px; border-radius: 12px; }
  /* Qualification grid — single column on mobile */
  .ldp-field-grid { grid-template-columns: 1fr; }
  .ldp-field.full { grid-column: 1; }
  /* Note textarea */
  .lc-note-input { font-size: 16px !important; padding: 12px 14px; border-radius: 10px; }
  /* Deal select */
  .lc-deal-sel { font-size: 16px !important; padding: 12px 14px; border-radius: 10px; }
}
@media (min-width: 641px) and (max-width: 1100px) {
  .col-desk { display: none !important; }
}

/* ── METRICS TAB ─────────────────────────── */
.metrics-wrap { width:100%; display:flex; flex-direction:column; gap:0; }
.metrics-logo-row { display:flex; align-items:center; gap:14px; margin-bottom:32px; }
.metrics-logo-row img { width:44px; height:44px; object-fit:contain; filter:drop-shadow(0 0 16px rgba(232,114,12,.4)); }
.metrics-logo-row-text {}
.metrics-logo-row-name { font-size:22px; font-weight:900; letter-spacing:-.5px; color:#fff; }
.metrics-logo-row-sub  { font-size:10px; font-weight:600; color:var(--muted); margin-top:4px; letter-spacing:1.5px; text-transform:uppercase; }
.metrics-period {
  display:flex; gap:0; margin-bottom:40px;
  overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap;
  border-bottom:1px solid var(--b); padding-bottom:0;
}
.mp-btn {
  padding:10px 18px; border:none; border-bottom:2px solid transparent;
  background:none; color:var(--muted); font-family:var(--font);
  font-size:12px; font-weight:600; cursor:pointer; transition:color .15s, border-color .15s;
  touch-action:manipulation; white-space:nowrap; flex-shrink:0; margin-bottom:-1px;
  letter-spacing:.2px;
}
.mp-btn:hover { color:var(--text); }
.mp-btn.active { color:#fff; font-weight:800; border-bottom-color:#fff; }
.metrics-sec { margin-bottom:40px; }
.metrics-sec-lbl {
  font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted2); margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--b);
}
.metrics-grid { display:grid; gap:1px; background:var(--b); border:1px solid var(--b); border-radius:var(--r); overflow:hidden; }
.metrics-grid.g2 { grid-template-columns:1fr 1fr; }
.metrics-grid.g3 { grid-template-columns:repeat(3,1fr); }
.metrics-grid.g4 { grid-template-columns:repeat(4,1fr); }

/* ── Polished hero metric cards (Booked / Won / Cash) ── */
.mstat-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:32px; }
.mstat { background:linear-gradient(160deg,var(--s2),var(--s1)); border:1px solid var(--b); border-radius:16px; padding:20px; }
.mstat-ic { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:14px; }
.mstat-lbl { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
.mstat-val { font-size:30px; font-weight:900; letter-spacing:-1px; margin-top:6px; line-height:1; }
.mstat-sub { font-size:11px; color:var(--muted); margin-top:8px; }

/* ── Closer kanban (Booked/Won/Lost/No-show) ── */
.kanban { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kan-col { background:var(--s1); border:1px solid var(--b); border-radius:14px; padding:12px; }
.kan-col-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.kan-col-ttl { font-size:10px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; }
.kan-count { font-size:11px; font-weight:800; background:var(--s3); border-radius:99px; padding:2px 8px; color:var(--muted); }
.kan-card { background:var(--s2); border:1px solid var(--b); border-radius:10px; padding:10px 11px; margin-bottom:8px; }
.kan-card:last-child { margin-bottom:0; }
.kan-card-name { font-size:12.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.kan-card-meta { font-size:10.5px; color:var(--muted); margin-top:3px; }
.kan-empty { font-size:11px; color:var(--muted2); padding:6px 2px; }
.kan-col.k-booked { border-top:2px solid #38bdf8; } .kan-col.k-booked .kan-col-ttl { color:#38bdf8; }
.kan-col.k-won { border-top:2px solid var(--green); } .kan-col.k-won .kan-col-ttl { color:var(--green); }
.kan-col.k-lost { border-top:2px solid var(--red); } .kan-col.k-lost .kan-col-ttl { color:var(--red); }
.kan-col.k-noshow { border-top:2px solid var(--yellow); } .kan-col.k-noshow .kan-col-ttl { color:var(--yellow); }
@media (max-width:640px){ .mstat-row { grid-template-columns:1fr; gap:10px; margin-bottom:24px; } .mstat-val { font-size:26px; } .kanban { grid-template-columns:1fr 1fr; gap:8px; } }

/* ── Kalendar tab (agenda) ── */
.cal-wrap { width:100%; max-width:760px; margin:0 auto; }
.cal-sec { margin-bottom:32px; }
.cal-sec-lbl { font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted2); margin-bottom:14px; }
.cal-day { margin-bottom:18px; }
.cal-day-hd { font-size:12px; font-weight:800; color:var(--text); margin-bottom:8px; display:flex; align-items:center; gap:8px; text-transform:capitalize; }
.cal-day-count { font-size:10px; font-weight:800; background:var(--s3); color:var(--muted); border-radius:99px; padding:2px 8px; }
.cal-appt { display:flex; align-items:center; gap:14px; padding:13px 15px; background:var(--s1); border:1px solid var(--b); border-radius:12px; margin-bottom:8px; transition:border-color .15s; }
.cal-appt:hover { border-color:var(--b2); }
.cal-appt-time { flex-shrink:0; width:52px; font-size:14px; font-weight:800; color:var(--accent); display:flex; flex-direction:column; line-height:1.25; }
.cal-appt-time span { font-size:10px; font-weight:600; color:var(--muted); }
.cal-appt-main { flex:1; min-width:0; }
.cal-appt-name { font-size:13.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cal-appt-sub { font-size:11px; color:var(--muted); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cal-appt-sub a { color:#38bdf8; text-decoration:none; }
.cal-empty { font-size:13px; color:var(--muted); padding:22px; text-align:center; background:var(--s1); border:1px solid var(--b); border-radius:12px; }
@media (max-width:640px){ .cal-appt-time { width:46px; font-size:13px; } }

.ms { background:var(--s1); padding:32px 30px; display:flex; flex-direction:column; gap:8px; transition:background .2s; }
.ms:hover { background:var(--s2); }
.ms-lbl { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.ms-val { font-size:64px; font-weight:900; line-height:1; letter-spacing:-4px; color:var(--text); }
.ms-val.c-green  { color:var(--green); }
.ms-val.c-yellow { color:var(--yellow); }
.ms-val.c-red    { color:var(--red); }
.ms-val.c-blue   { color:var(--accent); }
.ms-sub { font-size:11px; color:var(--muted); font-weight:500; margin-top:4px; letter-spacing:.1px; }
.ms-closer-head { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.ms-closer-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ms-closer-stat {}
.ms-closer-lbl { font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.ms-closer-val { font-size:36px; font-weight:900; line-height:1; letter-spacing:-1.5px; }

@media (max-width:640px) {
  .metrics-grid.g4 { grid-template-columns:repeat(2,1fr); }
  .metrics-grid.g3 { grid-template-columns:repeat(2,1fr); }
  .metrics-grid.g2 { grid-template-columns:1fr; }
  .ms { padding:16px 14px; }
  .ms-lbl { font-size:8px; }
  .ms-val { font-size:36px; letter-spacing:-1.5px; }
  .ms-sub { font-size:10px; }
  .ms-closer-grid { gap:8px; }
  .ms-closer-val { font-size:26px; }
}

/* ── AI SCENARIO DROPDOWN ──────────────── */
.ldp-ai-group { display: flex; gap: 1px; }
.ldp-ai-group .ldp-ca-ai { border-radius: 11px 0 0 11px; flex: 1; }
.ldp-ai-group .ldp-ca-ai-caret {
  border-radius: 0 11px 11px 0; padding: 12px 10px; flex: 0 0 auto;
  font-size: 14px; min-width: 36px;
}
.ai-scenario-menu {
  position: absolute; z-index: 9500;
  background: var(--s1); border: 1px solid var(--b2); border-radius: 12px;
  box-shadow: 0 14px 38px rgba(0,0,0,.5);
  min-width: 260px; max-width: 320px;
  padding: 6px;
  animation: fade-in-up .15s ease-out;
}
.ai-scenario-item {
  padding: 10px 12px; border-radius: 9px; cursor: pointer;
  transition: background .12s;
}
.ai-scenario-item:hover { background: rgba(168,85,247,.10); }
.ai-scenario-label { font-size: 13px; font-weight: 700; color: var(--text); }
.ai-scenario-hint  { font-size: 11px; color: var(--muted); margin-top: 2px; }
@keyframes fade-in-up {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── FIRST-RESPONSE WAITING BANNER ────── */
.wait-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-radius: 12px; cursor: pointer;
  background: rgba(244,63,94,.08); border: 1px solid rgba(244,63,94,.3);
  transition: background .15s, border-color .15s;
}
.wait-banner:hover { background: rgba(244,63,94,.14); border-color: rgba(244,63,94,.5); }
.wait-banner-icon { font-size: 20px; flex-shrink: 0; }
.wait-banner-text { flex: 1; }
.wait-banner-title { font-size: 13px; font-weight: 800; color: var(--red); }
.wait-banner-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.wait-banner-count { font-size: 28px; font-weight: 900; color: var(--red); letter-spacing: -1px; }

/* ── TIME TO CLOSE ─────────────────────── */
.ttc-wrap { display: flex; flex-direction: column; gap: 8px; padding: 8px 0; }
.ttc-row {
  display: grid; grid-template-columns: 130px 1fr 80px 80px;
  align-items: center; gap: 12px; padding: 6px 0;
}
.ttc-row-label { font-size: 12px; font-weight: 800; }
.ttc-row-bar { height: 10px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.ttc-row-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.16,1,.3,1); }
.ttc-row-val { font-size: 14px; font-weight: 900; color: var(--text); }
.ttc-row-count { font-size: 11px; color: var(--muted); text-align: right; }
@media (max-width: 600px) {
  .ttc-row { grid-template-columns: 90px 1fr 60px; }
  .ttc-row-count { display: none; }
}

/* ── AI INSIGHTS ───────────────────────── */
.insights-body {
  padding: 16px 18px; font-size: 13px; line-height: 1.6;
  background: linear-gradient(135deg, rgba(168,85,247,.06), rgba(168,85,247,.01));
  border: 1px solid rgba(168,85,247,.2); border-radius: 12px;
}
.insights-body strong { color: var(--mateja); font-size: 12px; letter-spacing: .8px; text-transform: uppercase; display: block; margin: 10px 0 6px; }
.insights-body strong:first-child { margin-top: 0; }
.insight-bullet { padding: 3px 0; color: var(--text); }
.insight-spacer { height: 8px; }
.insights-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(168,85,247,.18);
}

/* ── MANAGER DASHBOARD ──────────────── */
/* ── CONVERSION FUNNEL (Mochi-style: stage cards + flowing river) ── */
.fnl-cards { display:grid; grid-template-columns:repeat(4,1fr); border:1px solid var(--b); border-bottom:none; border-radius:14px 14px 0 0; overflow:hidden; background:var(--s1); }
.fnl-card { padding:16px 18px; border-right:1px solid var(--b); }
.fnl-card:last-child { border-right:none; }
.fnl-card-hd { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; margin-bottom:12px; }
.fnl-card-hd svg { width:16px; height:16px; flex-shrink:0; }
.fnl-card-val { font-size:26px; font-weight:900; letter-spacing:-1px; line-height:1; color:var(--text); }
.fnl-stream-wrap { position:relative; border:1px solid var(--b); border-radius:0 0 14px 14px; background:var(--s1); overflow:hidden; }
.fnl-stream { display:block; width:100%; height:210px; }
.fnl-badge { position:absolute; top:50%; transform:translate(-50%,-50%); display:inline-flex; align-items:center; gap:5px;
  background:var(--s3); border:1px solid var(--b2); border-radius:99px; padding:5px 11px;
  font-size:11px; font-weight:800; color:var(--text); white-space:nowrap; box-shadow:0 2px 10px rgba(0,0,0,.35); }
.fnl-badge svg { width:11px; height:11px; opacity:.65; }
.fnl-foot { display:flex; flex-wrap:wrap; gap:20px; padding:14px 4px 2px; font-size:12px; color:var(--muted); }
.fnl-foot-item { display:flex; align-items:center; gap:8px; }
.fnl-foot-item b { color:var(--text); font-weight:800; }
.fnl-foot-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
@media (max-width: 640px) {
  .fnl-cards { grid-template-columns:1fr 1fr; }
  .fnl-card:nth-child(2) { border-right:none; }
  .fnl-card:nth-child(1), .fnl-card:nth-child(2) { border-bottom:1px solid var(--b); }
  .fnl-card-val { font-size:22px; }
  .fnl-stream { height:150px; }
}

/* ── LIVE CLOSE CELEBRATION ────────────── */
.close-celebrate {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(0);
  display: flex; align-items: center; gap: 14px;
  background: linear-gradient(135deg, rgba(34,197,94,.95), rgba(16,185,129,.95));
  color: #052e1a;
  border-radius: 16px; padding: 14px 20px;
  box-shadow: 0 24px 60px rgba(34,197,94,.4), 0 0 0 1px rgba(255,255,255,.15);
  z-index: 10000; animation: cc-drop .45s cubic-bezier(.16,1,.3,1);
  overflow: hidden; min-width: 280px; max-width: 92vw;
}
.close-celebrate.leaving { animation: cc-lift .35s ease-in forwards; }
.cc-emoji { font-size: 28px; line-height: 1; }
.cc-title { font-size: 13px; font-weight: 900; letter-spacing: 2px; }
.cc-sub   { font-size: 14px; font-weight: 700; margin-top: 2px; }
.cc-close {
  cursor: pointer; font-size: 22px; line-height: 1; padding: 0 4px;
  color: rgba(5,46,26,.6);
}
.cc-close:hover { color: #052e1a; }
.cc-confetti {
  position: absolute; top: -8px; width: 6px; height: 10px; border-radius: 2px;
  pointer-events: none; animation: cc-fall linear forwards;
}
@keyframes cc-drop {
  from { transform: translateX(-50%) translateY(-140%); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0);     opacity: 1; }
}
@keyframes cc-lift {
  to { transform: translateX(-50%) translateY(-160%); opacity: 0; }
}
@keyframes cc-fall {
  to { transform: translateY(180px) rotate(540deg); opacity: 0; }
}

/* ── MORNING BRIEFING ──────────────────── */
.briefing-card {
  background: linear-gradient(135deg, color-mix(in srgb, var(--bc) 12%, transparent), var(--s1));
  border: 1px solid color-mix(in srgb, var(--bc) 30%, var(--b));
  border-radius: 16px; padding: 18px 20px; margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.briefing-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.briefing-greet { font-size: 20px; font-weight: 900; letter-spacing: -.4px; }
.briefing-sub { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 2px; letter-spacing: .3px; }
.briefing-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.briefing-stat {
  background: var(--s2); border: 1px solid var(--b); border-radius: 10px;
  padding: 10px 12px;
}
.briefing-stat-val { font-size: 22px; font-weight: 900; letter-spacing: -.8px; line-height: 1; }
.briefing-stat-lbl { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-top: 4px; }
.briefing-bar { height: 4px; background: var(--s3); border-radius: 99px; overflow: hidden; margin-top: 14px; }
.briefing-bar-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.16,1,.3,1); }
@media (max-width: 720px) {
  .briefing-stats { grid-template-columns: repeat(2, 1fr); }
  .briefing-greet { font-size: 17px; }
  .briefing-stat-val { font-size: 18px; }
}

/* ── BULK ACTIONS ──────────────────────── */
.ltr-chk-cell { width: 36px; padding-left: 14px !important; padding-right: 4px !important; }
.ltr-chk {
  width: 16px; height: 16px; cursor: pointer; accent-color: var(--green);
  margin: 0; vertical-align: middle;
}
tr.ltr-selected { background: rgba(34,197,94,.06); }
tr.ltr-selected:hover { background: rgba(34,197,94,.10); }

.bulk-bar {
  position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 30px);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: var(--s1); border: 1px solid var(--b2);
  padding: 10px 14px; border-radius: 14px;
  box-shadow: 0 16px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
  z-index: 9000; opacity: 0; pointer-events: none;
  transition: opacity .18s, transform .18s;
  max-width: calc(100vw - 32px);
}
.bulk-bar.show { opacity: 1; pointer-events: auto; transform: translate(-50%, 0); }
.bulk-count { font-size: 12px; font-weight: 800; color: var(--green); padding: 0 4px; letter-spacing: .3px; }
.bulk-sep { width: 1px; height: 22px; background: var(--b); }
.bulk-group { display: flex; align-items: center; gap: 6px; }
.bulk-lbl   { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); padding-right: 2px; }
.bulk-btn {
  background: var(--s2); border: 1px solid var(--b); color: var(--text);
  padding: 7px 11px; font-size: 12px; font-weight: 700; border-radius: 8px; cursor: pointer;
  transition: all .12s; font-family: inherit;
}
.bulk-btn:hover { border-color: var(--b2); transform: translateY(-1px); }
.bulk-btn.bulk-m { color: var(--mateja); border-color: rgba(168,85,247,.35); }
.bulk-btn.bulk-d { color: var(--dusica); border-color: rgba(249,115,22,.35); }
.bulk-btn.bulk-dq { color: var(--red); border-color: rgba(244,63,94,.35); }
.bulk-btn.bulk-clear { color: var(--muted); }
.bulk-date {
  background: var(--s2); border: 1px solid var(--b); color: var(--text);
  padding: 6px 8px; font-size: 12px; border-radius: 8px; font-family: inherit;
}
@media (max-width: 768px) {
  .bulk-bar { left: 8px; right: 8px; bottom: 76px; transform: none; flex-direction: column; align-items: stretch; max-width: none; }
  .bulk-bar.show { transform: none; }
  .bulk-sep { display: none; }
  .bulk-group { justify-content: flex-start; flex-wrap: wrap; }
}

/* ── LEAD ACTIVITY TIMELINE ────────────── */
.lat-host { display:flex; flex-direction:column; gap:0; max-height:340px; overflow-y:auto; }
.lat-row {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 0; border-top: 1px solid var(--b);
}
.lat-row:first-child { border-top: none; padding-top: 4px; }
.lat-icon {
  font-size: 14px; flex-shrink: 0;
  width: 26px; height: 26px; border-radius: 8px;
  background: var(--s2); display: grid; place-items: center;
}
.lat-body { flex:1; min-width:0; }
.lat-line { font-size: 12px; line-height: 1.45; color: var(--muted); }
.lat-actor { color: var(--text); font-weight: 700; }
.lat-action { color: var(--muted2); font-weight: 600; }
.lat-desc { color: var(--text); }
.lat-time { font-size: 10px; color: var(--muted2); font-weight: 600; margin-top: 2px; letter-spacing: .3px; }

/* ── CLICK-TO-CONTACT BIG BUTTONS (detail panel) ── */
.ldp-contact-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
.ldp-ca-btn.ldp-ca-ai {
  background: linear-gradient(135deg, rgba(168,85,247,.12), rgba(147,51,234,.08));
  border-color: rgba(168,85,247,.4); color: var(--mateja);
  font-weight: 800;
}
.ldp-ca-btn.ldp-ca-ai:hover {
  background: linear-gradient(135deg, rgba(168,85,247,.2), rgba(147,51,234,.15));
  border-color: rgba(168,85,247,.7); color: #d8b4fe;
}
.ldp-ca-btn.ldp-ca-ai:disabled { opacity: .6; cursor: wait; }

/* Call outcome quick buttons */
.ldp-call-outcomes {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 6px; margin-bottom: 8px;
}
.ldp-co-btn {
  padding: 9px 8px; border-radius: 9px;
  background: var(--s2); border: 1px solid var(--b); color: var(--text);
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .12s;
  font-family: inherit;
}
.ldp-co-btn:hover { transform: translateY(-1px); border-color: var(--b2); }
.ldp-co-ans:hover  { background: rgba(34,197,94,.10);  border-color: rgba(34,197,94,.4);  color: var(--green); }
.ldp-co-noans:hover{ background: rgba(234,179,8,.10);  border-color: rgba(234,179,8,.4);  color: var(--yellow); }
.ldp-co-vm:hover   { background: rgba(96,165,250,.10); border-color: rgba(96,165,250,.4); color: #60a5fa; }
.ldp-co-bad:hover  { background: rgba(244,63,94,.10);  border-color: rgba(244,63,94,.4);  color: var(--red); }
.ldp-ca-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 14px; border-radius: 11px; border: 1px solid var(--b);
  background: var(--s2); color: var(--text);
  font-size: 13px; font-weight: 700; letter-spacing: .2px;
  text-decoration: none; cursor: pointer;
  transition: all .12s;
}
.ldp-ca-btn:hover { transform: translateY(-1px); border-color: var(--b2); }
.ldp-ca-btn.ldp-ca-call:hover { background: rgba(232,114,12,.10); border-color: rgba(232,114,12,.45); color: #60a5fa; }
.ldp-ca-btn.ldp-ca-wa:hover   { background: rgba(37,211,102,.10); border-color: rgba(37,211,102,.5);  color: #25D366; }
.ldp-ca-btn.ldp-ca-call svg { color: #E8720C; }
.ldp-ca-btn.ldp-ca-wa   svg { color: #25D366; }

/* ── CLICK-TO-CONTACT ICONS ────────────── */
.ca-row { display:inline-flex; gap:6px; margin-left:8px; vertical-align:middle; }
.ca-btn {
  display:inline-grid; place-items:center;
  width:24px; height:24px; border-radius:7px;
  border: 1px solid var(--b);
  background: var(--s2);
  color: var(--muted);
  cursor: pointer; transition: all .12s;
  text-decoration: none;
}
.ca-btn:hover { transform: translateY(-1px); }
.ca-btn.ca-call { color: var(--nikola, #E8720C); }
.ca-btn.ca-call:hover { background: rgba(232,114,12,.12); border-color: rgba(232,114,12,.4); }
.ca-btn.ca-wa   { color: #25D366; }
.ca-btn.ca-wa:hover   { background: rgba(37,211,102,.12); border-color: rgba(37,211,102,.4); }
.ca-btn.ca-lg { width:38px; height:38px; border-radius:10px; }
.ca-btn.ca-lg svg { width:18px; height:18px; }

/* ── SPEED-TO-LEAD TOAST ───────────────── */
.stl-toast-wrap {
  position: fixed; right: 16px; bottom: 16px;
  display: flex; flex-direction: column; gap: 10px;
  z-index: 9999; max-width: 360px; pointer-events: none;
}
.stl-toast {
  pointer-events: auto;
  background: linear-gradient(135deg, rgba(34,197,94,.16), rgba(34,197,94,.06));
  border: 1px solid rgba(34,197,94,.4);
  border-radius: 14px;
  padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start;
  box-shadow: 0 12px 32px rgba(0,0,0,.4), 0 0 24px rgba(34,197,94,.15);
  animation: stl-slide-in .35s ease-out;
  cursor: pointer; transition: transform .12s;
}
.stl-toast:hover { transform: translateX(-2px); }
.stl-toast.leaving { animation: stl-slide-out .25s ease-in forwards; }
.stl-toast-icon {
