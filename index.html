/* Deep-link: open a specific lead from ?lead=<ghl contactId> (e.g. a Slack
   notification button → https://tkdcrm.space/?lead={{contact.id}}). Fetches
   the lead if it isn't already in the current cache. */
async function handleDeepLink(){
  // id from the current URL, or from localStorage (survives the Google OAuth round-trip)
  let id = DEEP_LEAD_ID;
  if (!id) {
    try {
      const raw = localStorage.getItem('stl_deeplink');
      if (raw) { const o = JSON.parse(raw); if (o && o.id && (Date.now() - o.t) < 15*60000) id = o.id; }
    } catch(e) {}
  }
  if (!id) return;
  try { localStorage.removeItem('stl_deeplink'); } catch(e) {}

  let lead = (cachedLeads||[]).find(l => l.id === id);
  // not in the loaded view → try the tracker DB
  if (!lead) {
    const { data } = await sb.from('ghl_leads').select('*').eq('id', id).single();
    if (data) { cachedLeads.push(data); lead = data; }
  }
  // still missing (e.g. brand-new lead not synced yet) → fetch live from GHL
  if (!lead) {
    try {
      const r = await fetch(`/api/ghl-contact?id=${encodeURIComponent(id)}`);
      if (r.ok) {
        const j = await r.json();
        if (j && j.contact) {
          lead = mapContact(j.contact, leadTypeFromTags(j.contact.tags));
          lead.status = 'Novi';
          cachedLeads.push(lead);
        }
      }
    } catch(e) {}
  }
  if (!lead) return;
  if (currentTab !== 'leads') setTab('leads');
  setTimeout(() => openLeadDetail(id), currentTab !== 'leads' ? 350 : 60);
}

/* ── Kalendar tab: agenda of GHL calendar appointments, grouped by day ── */
async function renderKalendarTab(){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="empty"><div class="empty-icon" style="font-size:20px">⏳</div><div class="empty-text">Učitavam kalendar...</div></div>';
  const now=Date.now();
  const data=await fetch(`/api/ghl-appointments?start=${now-90*864e5}&end=${now+180*864e5}`).then(r=>r.json()).catch(()=>({error:'fetch'}));
  if(data.error){
    el.innerHTML=`<div class="empty" style="padding:40px"><div class="empty-icon" style="font-size:22px">📅</div><div class="empty-text">Kalendar trenutno nedostupan.<br><span style="color:var(--muted);font-size:12px">${esc(data.hint||data.error)}</span></div></div>`;
    return;
  }
  const evs=(data.events||[]).filter(e=>!e.deleted).sort((a,b)=>String(a.startTime).localeCompare(String(b.startTime)));
  const todayMid=new Date(); todayMid.setHours(0,0,0,0);
  const todayKey=new Date().toISOString().slice(0,10);
  const upcoming=evs.filter(e=>new Date(e.startTime)>=todayMid);
  const past=evs.filter(e=>new Date(e.startTime)<todayMid).reverse();

  const groupByDay=list=>{
    const m=new Map();
    list.forEach(e=>{const k=new Date(e.startTime).toISOString().slice(0,10);(m.get(k)||m.set(k,[]).get(k)).push(e);});
    return [...m.entries()];
  };
  const dayHeader=k=>{
    const d=new Date(k+'T00:00');
    const lbl=d.toLocaleDateString('sr-RS',{weekday:'long',day:'numeric',month:'long'});
    return k===todayKey?`<span style="color:var(--accent)">Danas</span> · ${lbl}`:lbl;
  };
  const card=e=>{
    const d=new Date(e.startTime), end=e.endTime?new Date(e.endTime):null;
    const t1=d.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'});
    const t2=end?end.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'}):'';
    const st=_apptSt(e);
    const map={confirmed:{l:'Zakazano',c:'a-booked'},new:{l:'Zakazano',c:'a-booked'},booked:{l:'Zakazano',c:'a-booked'},showed:{l:'Došao',c:'a-showed'},noshow:{l:'Nije došao',c:'a-noshow'},cancelled:{l:'Otkazano',c:'a-cancel'},invalid:{l:'Nevažeće',c:'a-cancel'}};
    const s=map[st]||{l:st||'—',c:'a-booked'};
    const addr=e.address||''; const isUrl=/^https?:\/\//.test(addr);
    const known=e.contactId && (cachedLeads||[]).some(l=>l.id===e.contactId);
    const click=known?`onclick="openLeadDetail('${esc(e.contactId)}')" style="cursor:pointer"`:'';
    return `<div class="cal-appt" ${click}>
      <div class="cal-appt-time">${esc(t1)}${t2?`<span>${esc(t2)}</span>`:''}</div>
      <div class="cal-appt-main">
        <div class="cal-appt-name">${esc(e.title||'Poziv')}</div>
        <div class="cal-appt-sub">${esc(e.calendarName||'')}${addr?(isUrl?` · <a href="${esc(addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Join Meet</a>`:` · 📍 ${esc(addr)}`):''}</div>
      </div>
      <span class="ldp-appt-status ${s.c}">${esc(s.l)}</span>
    </div>`;
  };
  const section=(title,groups,emptyMsg)=>`<div class="cal-sec">
    <div class="cal-sec-lbl">${title}</div>
    ${groups.length?groups.map(([k,items])=>`<div class="cal-day"><div class="cal-day-hd">${dayHeader(k)}<span class="cal-day-count">${items.length}</span></div>${items.map(card).join('')}</div>`).join(''):`<div class="cal-empty">${emptyMsg}</div>`}
  </div>`;

  el.innerHTML=`<div class="cal-wrap">
    <div class="metrics-logo-row">
      <img src="straletkd-logo.png" alt="STRALETKD"/>
      <div class="metrics-logo-row-text">
        <div class="metrics-logo-row-name">Kalendar</div>
        <div class="metrics-logo-row-sub">${upcoming.length} predstojećih · ${data.count||evs.length} ukupno</div>
      </div>
    </div>
    ${section('Predstojeći pozivi',groupByDay(upcoming),'Nema zakazanih poziva.')}
    ${past.length?section('Prošli pozivi',groupByDay(past).slice(0,20),''):''}
  </div>`;
}

function renderClosersBoard(appts, closedLeads, host){

  const inSt = (...s) => appts.filter(a => s.includes(_apptSt(a)));
  const booked = inSt('confirmed','new','booked').sort((a,b)=>String(a.startTime).localeCompare(String(b.startTime)));
  const noshow = inSt('noshow').sort((a,b)=>String(b.startTime).localeCompare(String(a.startTime)));
  const lost   = inSt('cancelled','invalid').sort((a,b)=>String(b.startTime).localeCompare(String(a.startTime)));
  const won    = [...closedLeads].sort((a,b)=>(Number(b.deal_value)||0)-(Number(a.deal_value)||0));
  const apptCard = a => {
    const d = new Date(a.startTime);
    const when = isNaN(d) ? '' : `${d.toLocaleDateString('sr-RS',{day:'numeric',month:'short'})} · ${d.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'})}`;
    return `<div class="kan-card"><div class="kan-card-name">${esc(a.title||'Poziv')}</div><div class="kan-card-meta">${esc(when)}</div></div>`;
  };
  const wonCard = l => `<div class="kan-card"><div class="kan-card-name">${esc(l.name||'Klijent')}</div><div class="kan-card-meta" style="color:var(--green)">${l.deal_value!=null?'€'+Number(l.deal_value).toLocaleString('sr-RS'):'—'}</div></div>`;
  const col = (cls,title,items,render) => `<div class="kan-col ${cls}"><div class="kan-col-hd"><span class="kan-col-ttl">${title}</span><span class="kan-count">${items.length}</span></div>${items.length?items.slice(0,30).map(render).join(''):'<div class="kan-empty">—</div>'}</div>`;
  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">CLOSER BOARD — Mateja</div>
    <div class="kanban">
      ${col('k-booked','Zakazano',booked,apptCard)}
      ${col('k-won','Zatvoreno',won,wonCard)}
      ${col('k-lost','Otkazano',lost,apptCard)}
      ${col('k-noshow','Nije došao',noshow,apptCard)}
    </div>
  </div>`;
}

/* ── TIME-TO-CLOSE ─────────────────────────────────────────────
 * Median days from date_added → first 'Closed' activity, grouped
 * by lead_type (= source bucket). Uses lead_activities timestamps
 * so it reflects when the rep actually closed, not when GHL synced.
 * ─────────────────────────────────────────────────────────────── */
async function renderTimeToCloseSection(){
  const host = document.getElementById('time-to-close-section');
  if (!host) return;
  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">VREME DO ZATVARANJA — Po izvoru</div>
    <div style="padding:24px;text-align:center;color:var(--muted);font-size:12px">⏳ Učitavam...</div>
  </div>`;

  // 1) Get all closed leads + their lead_type
  const { data: closed } = await sb.from('ghl_leads')
    .select('id,date_added,lead_type,assigned_to')
    .eq('status','Closed')
    .limit(5000);
  if (!closed || !closed.length) {
    host.innerHTML = `<div class="metrics-sec"><div class="metrics-sec-lbl">VREME DO ZATVARANJA</div><div style="padding:24px;text-align:center;color:var(--muted);font-size:12px">Nema zatvorenih leadova još.</div></div>`;
    return;
  }
  const closedIds = closed.map(l => l.id);
  // 2) Get the timestamp when each lead first got status='Closed' from activity log
  const { data: acts } = await sb.from('lead_activities')
    .select('lead_id,new_value,created_at')
    .in('lead_id', closedIds)
    .eq('action_type', 'status')
    .eq('new_value', 'Closed')
    .order('created_at', { ascending: true });
  const closedAt = new Map();
  (acts||[]).forEach(a => {
    if (!closedAt.has(a.lead_id)) closedAt.set(a.lead_id, new Date(a.created_at).getTime());
  });

  // Build by-source + by-rep buckets
  const bySource = {}, byRep = {};
  closed.forEach(l => {
    if (!l.date_added) return;
    const closeT = closedAt.get(l.id);
    if (!closeT) return;
    const days = Math.round((closeT - new Date(l.date_added).getTime()) / 86400000);
    if (days < 0 || days > 365) return;
    const s = l.lead_type || 'other';
    if (!bySource[s]) bySource[s] = [];
    bySource[s].push(days);
    if (l.assigned_to) {
      if (!byRep[l.assigned_to]) byRep[l.assigned_to] = [];
      byRep[l.assigned_to].push(days);
    }
  });

  const median = arr => { if (!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]; };
  const labelMap = {
    qualified: 'Qualified',
    booked: 'Zakazan poziv',
    customer: 'Klijent',
    disqualified: 'Disqualified',
    other: 'Ostalo',
  };
  const colorMap = {
    qualified:'#E8720C', booked:'#38bdf8', customer:'#22c55e',
    disqualified:'#f43f5e', other:'#94a3b8',
  };

  const sourceRows = Object.entries(bySource)
    .sort((a,b) => b[1].length - a[1].length)
    .map(([k, arr]) => {
      const m = median(arr);
      const color = colorMap[k] || '#94a3b8';
      return `<div class="ttc-row">
        <div class="ttc-row-label" style="color:${color}">${labelMap[k] || k}</div>
        <div class="ttc-row-bar"><div class="ttc-row-fill" style="width:${Math.min(100, m*3)}%;background:${color}"></div></div>
        <div class="ttc-row-val">${m} ${m===1?'dan':'dana'}</div>
        <div class="ttc-row-count">${arr.length} closes</div>
      </div>`;
    }).join('');

  const repRows = Object.entries(byRep).map(([rep, arr]) => {
    const m = median(arr);
    const color = rep === 'mateja' ? 'var(--mateja)' : rep === 'dusica' ? 'var(--dusica)' : '#94a3b8';
    return `<div class="ttc-row">
      <div class="ttc-row-label" style="color:${color}">${cap(rep)}</div>
      <div class="ttc-row-bar"><div class="ttc-row-fill" style="width:${Math.min(100, m*3)}%;background:${color}"></div></div>
      <div class="ttc-row-val">${m} ${m===1?'dan':'dana'}</div>
      <div class="ttc-row-count">${arr.length} closes</div>
    </div>`;
  }).join('');

  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">VREME DO ZATVARANJA — Median po izvoru</div>
    <div class="ttc-wrap">${sourceRows || '<div style="padding:18px;color:var(--muted);font-size:12px;text-align:center">Nedovoljno aktivnosti — pokreni Sinhronizuj GHL.</div>'}</div>
    ${repRows ? `<div class="metrics-sec-lbl" style="margin-top:18px">PO PRODAVCU</div><div class="ttc-wrap">${repRows}</div>` : ''}
  </div>`;
}

/* ── AI INSIGHTS (win/loss patterns) ────────────────────────────
 * Sends a curated sample of Closed + DQ leads to Claude and
 * renders the resulting patterns. Cached in localStorage for 24h
 * to avoid burning tokens on every Metrics tab open.
 * ─────────────────────────────────────────────────────────────── */
const INSIGHTS_CACHE_KEY = 'toc:insights';

async function renderAIInsightsSection(){
  const host = document.getElementById('ai-insights-section');
  if (!host) return;

  const cached = (() => {
    try {
      const raw = localStorage.getItem(INSIGHTS_CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (Date.now() - parsed.ts > 24*3600*1000) return null;
      return parsed;
    } catch { return null; }
  })();

  if (cached?.insights) {
    renderInsightsContent(host, cached.insights, cached.ts);
    return;
  }

  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">AI ZAKLJUČCI — Šta radi, šta ne radi</div>
    <div style="padding:20px;text-align:center">
      <button class="ai-gen-btn" onclick="generateAIInsights()">✨ Pokreni AI analizu</button>
      <div style="font-size:10px;color:var(--muted2);margin-top:8px">Claude će uporediti Closed vs DQ leadove i naći obrasce. Rezultat je keširan 24h.</div>
    </div>
  </div>`;
}

async function generateAIInsights(){
  const host = document.getElementById('ai-insights-section');
  if (!host) return;
  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">AI ZAKLJUČCI — Šta radi, šta ne radi</div>
    <div style="padding:24px;text-align:center;color:var(--muted);font-size:13px"><span class="ai-spinner" style="margin-right:8px"></span> Claude analizira pattern-e...</div>
  </div>`;

  const cols = 'experience,knowledge,time_frame,pain_point,qualification,lead_type,tags';
  const [closedR, dqR] = await Promise.all([
    sb.from('ghl_leads').select(cols).eq('status','Closed').limit(80),
    sb.from('ghl_leads').select(cols).eq('status','DQ').limit(80),
  ]);

  try {
    const r = await fetch('/api/lead-insights', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ closed: closedR.data || [], dq: dqR.data || [] }),
    });
    const json = await r.json();
    if (!r.ok) {
      host.innerHTML = `<div class="metrics-sec"><div class="metrics-sec-lbl">AI ZAKLJUČCI</div><div style="padding:18px;color:var(--red);font-size:12px">${esc(json.error || r.status)}</div></div>`;
      return;
    }
    const payload = { insights: json.insights, ts: Date.now() };
    localStorage.setItem(INSIGHTS_CACHE_KEY, JSON.stringify(payload));
    renderInsightsContent(host, json.insights, payload.ts);
  } catch (e) {
    host.innerHTML = `<div class="metrics-sec"><div class="metrics-sec-lbl">AI ZAKLJUČCI</div><div style="padding:18px;color:var(--red);font-size:12px">${esc(e.message)}</div></div>`;
  }
}

function renderInsightsContent(host, text, ts){
  const when = ts ? new Date(ts).toLocaleString('sr-RS',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  // Basic markdown formatting: ** for headers, - for bullets
  const html = esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<div class="insight-bullet">• $1</div>')
    .replace(/\n\n+/g, '<div class="insight-spacer"></div>');
  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">AI ZAKLJUČCI — Šta radi, šta ne radi</div>
    <div class="insights-body">${html}</div>
    <div class="insights-foot">
      <span style="font-size:10px;color:var(--muted2)">Generisano ${esc(when)}</span>
      <button class="ai-regen-btn" onclick="generateAIInsights()">↻ Regeneriši</button>
    </div>
  </div>`;
}

/* ── MANAGER DASHBOARD ──────────────────────────────────────────
 * Manager-only single-screen overview. Shows per-rep:
 *   - Calls today vs target
 *   - Closes today / this week / this month
 *   - Open pipeline ($)
 *   - Top stale lead (oldest "Follow Up" untouched)
 *   - Last activity time
 * + team-wide totals at the top.
 * ─────────────────────────────────────────────────────────────── */
async function renderFunnelSection(){
  const host = document.getElementById('funnel-section');
  if (!host) return;
  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">PRODAJNI LIJEVAK — VSL</div>
    <div style="padding:24px;text-align:center;color:var(--muted);font-size:12px">⏳ Učitavam...</div>
  </div>`;

  const qualTags = ['straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus'];
  const dqTags   = ['straletkd-disqualified','budget-under-100','dq'];

  const [allR, qualR, bookedR, closedR, dqR] = await Promise.all([
    sb.from('ghl_leads').select('id',{count:'exact',head:true}),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).overlaps('tags', qualTags),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).overlaps('tags', ['booked-call']),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).eq('status','Closed'),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).overlaps('tags', dqTags),
  ]);

  const ICON = {
    lead:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    qual:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l2.9 6.3 6.9.6-5.2 4.5 1.6 6.7L12 17l-6.2 3.6 1.6-6.7L2.2 8.9l6.9-.6z"/></svg>',
    booked:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
    closed:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  };
  const stages = [
    { key:'lead',   label:'Leadovi',       count: allR.count||0,    color:'#E8720C' },
    { key:'qual',   label:'Kvalifikovani', count: qualR.count||0,   color:'#f59e0b' },
    { key:'booked', label:'Zakazan poziv', count: bookedR.count||0, color:'#38bdf8' },
    { key:'closed', label:'Zatvoreni',     count: closedR.count||0, color:'#22c55e' },
  ];
  const conv = (a,b) => a === 0 ? 0 : Math.round((b/a) * 100);

  // Flowing "river" band: half-height per stage ∝ count, smoothed with cubic beziers.
  const W = 1000, H = 210, cy = H/2, n = stages.length;
  const maxV = Math.max(...stages.map(s => s.count), 1);
  const pts = stages.map((s,i) => ({ x: n>1 ? i/(n-1)*W : W/2, hh: Math.max((s.count/maxV)*(cy-14), 5) }));
  const topPts = pts.map(p => ({ x:p.x, y:cy-p.hh }));
  const botRev = pts.map(p => ({ x:p.x, y:cy+p.hh })).reverse();
  const curves = a => { let d=''; for (let i=1;i<a.length;i++){ const p0=a[i-1], p1=a[i], mx=(p0.x+p1.x)/2; d+=`C ${mx} ${p0.y}, ${mx} ${p1.y}, ${p1.x} ${p1.y} `; } return d; };
  const dPath = `M ${topPts[0].x} ${topPts[0].y} ` + curves(topPts) + `L ${botRev[0].x} ${botRev[0].y} ` + curves(botRev) + 'Z';

  const arrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
  let badges = '';
  for (let i=1;i<n;i++){
    const leftPct = ((i-0.5)/(n-1))*100;
    badges += `<div class="fnl-badge" style="left:${leftPct}%">${conv(stages[i-1].count, stages[i].count)}% ${arrowSvg}</div>`;
  }

  host.innerHTML = `<div class="metrics-sec">
    <div class="metrics-sec-lbl">PRODAJNI LIJEVAK — VSL</div>
    <div class="fnl-cards">
      ${stages.map(s => `<div class="fnl-card">
        <div class="fnl-card-hd" style="color:${s.color}">${ICON[s.key]}<span style="color:var(--muted)">${s.label}</span></div>
        <div class="fnl-card-val">${s.count.toLocaleString('sr-RS')}</div>
      </div>`).join('')}
    </div>
    <div class="fnl-stream-wrap">
      <svg class="fnl-stream" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
        <defs><linearGradient id="fnlGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#16335c"/><stop offset="0.55" stop-color="#2563eb"/><stop offset="1" stop-color="#3b82f6"/>
        </linearGradient></defs>
        <path d="${dPath}" fill="url(#fnlGrad)"/>
      </svg>
      ${badges}
    </div>
    <div class="fnl-foot">
      <div class="fnl-foot-item"><span class="fnl-foot-dot" style="background:var(--red)"></span>Diskvalifikovani: <b>${(dqR.count||0).toLocaleString('sr-RS')}</b></div>
      <div class="fnl-foot-item"><span class="fnl-foot-dot" style="background:var(--green)"></span>Lead → zatvoren: <b>${conv(stages[0].count, stages[3].count)}%</b></div>
      <div class="fnl-foot-item"><span class="fnl-foot-dot" style="background:#38bdf8"></span>Close rate (zakazan → zatvoren): <b>${conv(stages[2].count, stages[3].count)}%</b></div>
    </div>
  </div>`;
}

async function renderCommissionSection(){
  // Load all closed leads with deals from Supabase
  const {data}=await sb.from('ghl_leads').select('assigned_to,deal').eq('status','Closed').not('deal','is',null);
  const rows=data||[];

  const calcComm=(member)=>{
    const memberDeals=rows.filter(r=>r.assigned_to===member&&r.deal&&DEAL_PRICES[r.deal]);
    const total=memberDeals.reduce((s,r)=>s+(DEAL_PRICES[r.deal]||0),0);
    const byDeal={};
    memberDeals.forEach(r=>{ byDeal[r.deal]=(byDeal[r.deal]||0)+1; });
    return{total,byDeal,count:memberDeals.length};
  };

  const cM=calcComm('mateja'), cD=calcComm('dusica');

  const dealRows=(byDeal)=>Object.entries(byDeal).map(([key,cnt])=>{
    const d=DEALS[key];
    if(!d)return'';
    return`<div class="comm-deal-row">
      <span class="comm-deal-name">${d.icon} ${d.label} ×${cnt}</span>
      <span class="comm-deal-val">${d.price}</span>
    </div>`;
  }).join('');

  const commCell=(name,member,c,color)=>`
    <div class="comm-cell">
      <div class="comm-name">
        <div class="mc-av ${member}" style="width:30px;height:30px;flex-shrink:0">
          <img src="${member}.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>
        </div>
        <span style="color:${color}">${name}</span>
      </div>
      <div class="comm-amount" style="color:${color}">€${c.total.toLocaleString()}</div>
      <div class="comm-sub">${c.count} zatvorenih deala</div>
      ${c.count?`<div class="comm-deals">${dealRows(c.byDeal)}</div>`:''}
    </div>`;

  return`<div class="metrics-sec">
    <div class="metrics-sec-lbl">PROVIZIJA — Svi Zatvoreni Dealovi</div>
    <div class="comm-grid">
      ${commCell('Mateja','mateja',cM,'var(--mateja)')}
      ${commCell('Dusica','dusica',cD,'var(--dusica)')}
    </div>
  </div>`;
}

/* ── LEADS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadLeads(lead_type){
  let q=sb.from('ghl_leads').select('*').order('date_added',{ascending:false}).limit(5000);
  if(lead_type && lead_type!=='all'){
    const tagMap={
      qualified:['straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus'],
      disqualified:['straletkd-disqualified','budget-under-100','dq'],
      booked:['booked-call'],
      customer:['customer'],
    };
    const tags=tagMap[lead_type]||[];
    if(tags.length) q=q.overlaps('tags',tags);
  }
  const {data,error}=await q;
  if(error){console.error(error);return[];}
  return data||[];
}

/* ─────────────────── AI LEAD SUMMARY ──────────────────────────────
 * Calls /api/lead-summary which uses Anthropic's Claude to produce a
 * 3-sentence sales brief in Serbian. Cached per-lead in Supabase
 * (column ghl_leads.ai_summary) so we only burn a token when the
 * underlying data changes or the rep clicks "regenerate".
 *
 * Requires this Supabase SQL once:
 *   alter table ghl_leads add column if not exists ai_summary text;
 *   alter table ghl_leads add column if not exists ai_summary_at timestamptz;
 *
 * And ANTHROPIC_API_KEY set in Vercel env vars.
 * ─────────────────────────────────────────────────────────────── */
async function generateLeadSummary(leadId, force = false){
  const lead = (cachedLeads||[]).find(l => l.id === leadId);
  if (!lead) return;
  const host = document.getElementById('ai-summary-body');
  if (!host) return;

  if (!force && lead.ai_summary) {
    renderLeadSummary(lead);
    return;
  }

  host.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px"><span class="ai-spinner"></span> Generišem sažetak...</div>`;
  try {
    const r = await fetch('/api/lead-summary', {

/* ─────────────────── FIRST-RESPONSE TIME ──────────────────────────
 * Computes minutes between lead-arrival (date_added) and first
 * activity in lead_activities for that lead. Per-rep average shown
 * in Manager dashboard. Waiting leads >15min surfaced as banner.
 * ─────────────────────────────────────────────────────────────── */
async function loadFirstResponseStats(){
  // Pull last 200 activity events per lead in last 90 days to compute
  // first-touch latency. We just need min(created_at) per lead_id.
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-90);
  const { data, error } = await sb.from('lead_activities')
    .select('lead_id, created_at, actor_email')
    .gte('created_at', cutoff.toISOString())
    .limit(20000);
  if (error) return null;
  const firstByLead = new Map();
  (data||[]).forEach(a => {
    const t = new Date(a.created_at).getTime();
    if (!firstByLead.has(a.lead_id) || firstByLead.get(a.lead_id).t > t) {
      firstByLead.set(a.lead_id, { t, actor: a.actor_email || '' });
    }
  });
  // Match to ghl_leads to get assigned_to + date_added
  const ids = [...firstByLead.keys()];
  if (!ids.length) return { perRep: {} };
  const { data: leadsData } = await sb.from('ghl_leads')
    .select('id, assigned_to, date_added')
    .in('id', ids);
  const perRep = { mateja: [], dusica: [] };
  (leadsData||[]).forEach(l => {
    if (!l.assigned_to || !l.date_added) return;
    const first = firstByLead.get(l.id);
    if (!first) return;
    const arrival = new Date(l.date_added).getTime();
    const minutes = Math.round((first.t - arrival) / 60000);
    if (minutes < 0 || minutes > 60 * 24 * 30) return;  // sanity
    if (!perRep[l.assigned_to]) perRep[l.assigned_to] = [];
    perRep[l.assigned_to].push(minutes);
  });
  const stats = {};
  Object.keys(perRep).forEach(rep => {
    const arr = perRep[rep];
    if (!arr.length) { stats[rep] = null; return; }
    arr.sort((a,b) => a-b);
    const median = arr[Math.floor(arr.length/2)];
    const avg = Math.round(arr.reduce((s,v)=>s+v,0)/arr.length);
    stats[rep] = { count: arr.length, median, avg };
  });
  return { perRep: stats };
}

// Format minutes → "3min" / "47min" / "2h 15min" / "1d 4h"
function fmtMinutes(m){
  if (m == null) return '—';
  if (m < 60)   return `${m} min`;
  if (m < 1440) return `${Math.floor(m/60)}h ${m%60?(m%60)+'min':''}`.trim();
  const d = Math.floor(m/1440); const h = Math.floor((m%1440)/60);
  return `${d}d ${h?h+'h':''}`.trim();
}

// Returns array of unassigned/un-touched leads waiting >15min
function findWaitingLeads(){
  const cutoff = Date.now() - 15 * 60 * 1000;
  return (cachedLeads||[]).filter(l => {
    if (l.status === 'Closed' || l.status === 'DQ') return false;
    if (l.status !== 'Novi') return false;
    if (!l.date_added) return false;
    const arrived = new Date(l.date_added).getTime();
    if (arrived > cutoff) return false;  // arrived <15min ago
    // Only flag tracker-relevant leads
    const tags = l.tags || [];
    if (!tags.some(t => ['straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus','booked-call'].includes(t))) return false;
    return true;
  }).sort((a,b) => new Date(a.date_added) - new Date(b.date_added));
}

 * Generates a personalized first-touch WhatsApp message in Serbian
 * via /api/lead-message and opens wa.me with it pre-filled.
 * ─────────────────────────────────────────────────────────────── */
const AI_SCENARIOS = [
  { key: 'first-touch',   label: 'Prva poruka',           hint: 'Predstavljanje, prvi kontakt' },
  { key: 'no-pickup',     label: 'Nije se javio',         hint: 'Posle propuštenog poziva' },
  { key: 'asked-info',    label: 'Tražio info pa nestao', hint: 'Nudge da nastavi razgovor' },
  { key: 'cant-now',      label: 'Ne može sada',          hint: 'Posle objekcije o timingu' },
  { key: 'post-call',     label: 'Posle poziva',          hint: 'Gentle check-in' },
  { key: 'closing-nudge', label: 'Closing nudge',         hint: 'Finalni push za odluku' },
];

async function sendAIMessage(leadId, scenario = 'first-touch'){
  const lead = (cachedLeads||[]).find(l => l.id === leadId);
  if (!lead) return;
  if (!lead.phone) { alert('Nema broja za WhatsApp.'); return; }

  const btn = document.querySelector(`[data-ai-msg="${leadId}"]`);
  if (btn) { btn.innerHTML = '<span class="ai-spinner"></span> Pišem...'; btn.disabled = true; }
  // Close any open scenario menu
  const menu = document.getElementById('ai-scenario-menu');
  if (menu) menu.classList.remove('open');

  try {
    const r = await fetch('/api/lead-message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lead, scenario }),
    });
    const json = await r.json();
    if (!r.ok) {
      alert('Greška: ' + (json.error || r.status));
      return;
    }
    const phone = cleanPhone(lead.phone).replace(/^\+/, '');
    if (!phone) { alert('Telefon nije validan.'); return; }
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(json.message)}`;
    window.open(url, '_blank', 'noopener');
    const scenarioLabel = (AI_SCENARIOS.find(s => s.key === scenario) || {}).label || scenario;
    logActivity(leadId, 'note', null, `[AI ${scenarioLabel}] ${json.message.slice(0,140)}`);
  } catch (e) {
    alert('Greška: ' + e.message);
  } finally {
    if (btn) { btn.innerHTML = '✨ AI Poruka'; btn.disabled = false; }
  }
}

function toggleAIScenarioMenu(leadId, ev){
  ev?.stopPropagation?.();
  const existing = document.getElementById('ai-scenario-menu');
  if (existing) { existing.remove(); return; }
  const menu = document.createElement('div');
  menu.id = 'ai-scenario-menu';
  menu.className = 'ai-scenario-menu';
  menu.innerHTML = AI_SCENARIOS.map(s =>
    `<div class="ai-scenario-item" onclick="sendAIMessage('${esc(leadId)}','${s.key}')">
       <div class="ai-scenario-label">${esc(s.label)}</div>
       <div class="ai-scenario-hint">${esc(s.hint)}</div>
     </div>`
  ).join('');
  const trigger = document.querySelector(`[data-ai-scen="${leadId}"]`);
  if (!trigger) return;
  const rect = trigger.getBoundingClientRect();
  menu.style.top  = (window.scrollY + rect.bottom + 6) + 'px';
  menu.style.left = (window.scrollX + Math.max(8, rect.right - 280)) + 'px';
  document.body.appendChild(menu);
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function closer(){
      menu.remove();
      document.removeEventListener('click', closer);
    });
  }, 0);
}

/* ─────────────────── CALL OUTCOME LOGGING ─────────────────────────
 * One-tap quick buttons that log a call outcome to the activity
 * timeline and (for certain outcomes) update lead status.
 * ─────────────────────────────────────────────────────────────── */
async function logCallOutcome(leadId, outcome){
  const lead = (cachedLeads||[]).find(l => l.id === leadId);
  if (!lead) return;
  // Log call to activity (non-blocking) + optimistic local update
  logActivity(leadId, 'call', null, outcome);
  setLocalLastActivity(leadId, 'call', outcome);
  refreshLeadRows();

  // Auto-status changes based on outcome
  const statusMap = {
    'Pogrešan broj': 'DQ',
    'Javio se': lead.status === 'Novi' ? 'Follow Up' : null,
  };
  const newStatus = statusMap[outcome];
  if (newStatus && newStatus !== lead.status) {
    const oldStatus = lead.status || 'Novi';
    const { error } = await sb.from('ghl_leads').update({ status: newStatus }).eq('id', leadId);
    if (!error) {
      lead.status = newStatus;
      logActivity(leadId, 'status', oldStatus, newStatus);
      pushStatusToGHL(leadId, oldStatus, newStatus);
      // Partial panel update — don't full re-render
      if (currentLeadId === leadId) updatePanelStatusButtons(newStatus);
      refreshLeadRows();
    }
  }
  // Always refresh the activity timeline so the new entry appears
  if (currentLeadId === leadId) {
    setTimeout(() => renderLeadActivityInto('ldpActivityList', leadId), 80);
  }
  showCallOutcomeToast(lead.name, outcome);
}

/* ─────────────────── AUTO-RECYCLE STALE FOLLOW-UPS ────────────────
 * Leads sitting in "Follow Up" with no activity for 14+ days get
 * auto-reset to "Novi" and tagged so reps see them again. Runs
 * once per day via localStorage flag.
 * ─────────────────────────────────────────────────────────────── */
const RECYCLE_KEY = 'toc:last-recycle';
async function autoRecycleFollowUps(){
  const today = new Date().toISOString().slice(0,10);
  if (localStorage.getItem(RECYCLE_KEY) === today) return null;

  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-14);
  const cutoffIso = cutoff.toISOString();

  // Candidates: status='Follow Up' AND no follow_up_date in future
  const { data: candidates, error } = await sb.from('ghl_leads')
    .select('id,name,follow_up_date')
    .eq('status', 'Follow Up')
    .or(`follow_up_date.is.null,follow_up_date.lt.${today}`)
    .limit(1000);
  if (error || !candidates || !candidates.length) {
    localStorage.setItem(RECYCLE_KEY, today);
    return null;
  }

  // For each candidate, check if there's been any activity in last 14 days.
  // Batch: fetch activities for these lead_ids since cutoff.
  const ids = candidates.map(c => c.id);
  const { data: recent } = await sb.from('lead_activities')
    .select('lead_id')
    .in('lead_id', ids)
    .gte('created_at', cutoffIso);
  const hasRecent = new Set((recent||[]).map(r => r.lead_id));
  const toRecycle = candidates.filter(c => !hasRecent.has(c.id));
  if (!toRecycle.length) {
    localStorage.setItem(RECYCLE_KEY, today);
    return null;
  }

  // Bulk update to status='Novi'
  const recycleIds = toRecycle.map(c => c.id);
  const { error: upErr } = await sb.from('ghl_leads')
    .update({ status: 'Novi' })
    .in('id', recycleIds);
  if (!upErr) {
    recycleIds.forEach(id => logActivity(id, 'status', 'Follow Up', 'Novi'));
    recycleIds.forEach(id => {
      const cached = (cachedLeads||[]).find(l => l.id === id);
      if (cached) cached.status = 'Novi';
    });
  }
  localStorage.setItem(RECYCLE_KEY, today);
  return { recycled: toRecycle.length };
}

/* ─────────────────── LEAD SCORING ─────────────────────────────────
 * Heuristic 0–100 score, then bucketed into 🔥 hot / 🌤 warm / ❄️ cold.
 * Signals:
 *  + 35 if booked a call (booked-call)
 *  + 25 if qualified (straletkd-qualified / budget tiers)
 *  + 15 if status = Follow Up (engaged but pending)
 *  + 20 if has follow-up date in future
 *  + 15 if added within last 3 days (recency)
 *  +  5 if has Instagram (extra contactability)
 *  - 30 if untouched > 14 days
 *  - 50 if status = DQ
 * ─────────────────────────────────────────────────────────────── */
function leadScore(l){
  if (!l) return 0;
  if (l.status === 'Closed') return 100;
  if (l.status === 'DQ') return 0;
  let s = 20;
  const tags = l.tags || [];
  if (tags.includes('booked-call')) s += 35;
  if (tags.some(t => ['straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus'].includes(t))) s += 25;
  if (l.status === 'Follow Up') s += 15;
  const todayStr = new Date().toISOString().slice(0,10);
  if (l.follow_up_date && l.follow_up_date >= todayStr) s += 20;
  if (l.date_added) {
    const days = (Date.now() - new Date(l.date_added).getTime()) / 86400000;
    if (days <= 3) s += 15;
    else if (days > 14 && !l.follow_up_date) s -= 30;
  }
  if (l.instagram) s += 5;
  return Math.max(0, Math.min(100, s));
}
function leadHeat(score){
  if (score >= 70) return { label: 'Hot',  cls: 'heat-hot',  icon: '🔥' };
  if (score >= 45) return { label: 'Warm', cls: 'heat-warm', icon: '🌤' };
  return                  { label: 'Cold', cls: 'heat-cold', icon: '❄️' };
}

/* ─────────────────── ACTIVITY LOG ─────────────────────────────────
 * Every status/assign/followup/deal/note change is persisted into the
 * `lead_activities` Supabase table so we have an audit trail per lead.
 * Renders as a timeline inside the lead detail panel.
 *
 * Requires this Supabase SQL run once:
 *   create table if not exists lead_activities (
 *     id uuid primary key default gen_random_uuid(),
 *     lead_id text not null,
 *     actor_email text,
 *     action_type text not null,
 *     old_value text,
 *     new_value text,
 *     created_at timestamptz not null default now()
 *   );
 *   create index if not exists lead_activities_lead_id_idx
 *     on lead_activities (lead_id, created_at desc);
 * ─────────────────────────────────────────────────────────────── */
let _activityLogTableWarned = false;
async function logActivity(leadId, actionType, oldValue, newValue){
  if (!leadId || !actionType) return;
  // Skip no-ops
  const ov = oldValue==null ? null : String(oldValue);
  const nv = newValue==null ? null : String(newValue);
  if (ov === nv) return;
  try {
    const { error } = await sb.from('lead_activities').insert({
      lead_id: leadId,
      actor_email: currentUserEmail,
      action_type: actionType,
      old_value: ov,
      new_value: nv,
    });
    if (error) {
      const msg = (error.message||'') + ' ' + (error.code||'');
      const isMissingTable = /relation .* does not exist|PGRST20[0-5]/i.test(msg);
      const isRLSBlocked   = /row-level security|violates.*policy|RLS/i.test(msg);
      if ((isMissingTable || isRLSBlocked) && !_activityLogTableWarned) {
        _activityLogTableWarned = true;
        showActivityLogSetupWarning(isRLSBlocked ? 'rls' : 'table', error.message);
      }
    }
  } catch (e) { /* non-fatal */ }
}

function formatActivity(a){
  const map = {
    status:    { label: 'Status',    icon: '🔄' },
    assign:    { label: 'Dodeljen',  icon: '👤' },
    followup:  { label: 'Follow Up', icon: '📅' },
    deal:      { label: 'Paket',     icon: '💰' },
    note:      { label: 'Beleška',   icon: '📝' },
    created:   { label: 'Kreiran',   icon: '✨' },
  };
  const m = map[a.action_type] || { label: a.action_type, icon: '•' };
  const fmt = v => v==null||v==='' ? '∅' : v.length>40 ? v.slice(0,40)+'…' : v;
  let desc;
  if (a.action_type === 'note') {
    desc = a.new_value ? `napisao: "${fmt(a.new_value)}"` : 'obrisao belešku';
  } else if (a.old_value && a.new_value) {
    desc = `${fmt(a.old_value)} → ${fmt(a.new_value)}`;
  } else if (a.new_value) {
    desc = `postavljeno: ${fmt(a.new_value)}`;
  } else {
    desc = `uklonjeno: ${fmt(a.old_value)}`;
  }
  return { icon: m.icon, label: m.label, desc };
}

function timeAgoSr(iso){
  const t = new Date(iso).getTime();
  const diff = (Date.now() - t) / 1000;
  if (diff < 60) return 'sada';
  if (diff < 3600) return `pre ${Math.floor(diff/60)}min`;
  if (diff < 86400) return `pre ${Math.floor(diff/3600)}h`;
  if (diff < 86400*7) return `pre ${Math.floor(diff/86400)}d`;
  return new Date(iso).toLocaleDateString('sr-RS', { day:'numeric', month:'short', year:'2-digit' });
}

function cleanPhone(p){
  if (!p) return '';
  // Keep leading '+' but strip everything non-digit
  const s = String(p).trim();
  const lead = s.startsWith('+') ? '+' : '';
  return lead + s.replace(/[^\d]/g, '');
}
function waGreetingFor(lead){
  const firstName = (lead.name || '').split(' ')[0] || '';
  const repName   = lead.assigned_to === 'mateja' ? 'Mateja' : '';

  const middle = booked ? `, vidim da si zakazao poziv` : '';
  return `Ćao ${name}, ${intro}${middle}. Jel imaš sekund?`;
}
function waLink(lead){
  const phone = cleanPhone(lead.phone).replace(/^\+/, '');
  if (!phone) return '';
  return `https://wa.me/${phone}?text=${encodeURIComponent(waGreetingFor(lead))}`;
}
function telLink(phone){

  return p ? `tel:${p}` : '';

/* ─────────────────── SPEED-TO-LEAD NOTIFICATIONS ──────────────────
 * Polls /api/ghl-recent every ~90s. The first poll establishes a
 * baseline of "already seen" lead IDs (no notifications fired).
 * After that, any new contact whose tags overlap a tracker-relevant
 * tag fires a desktop notification + in-app toast. Click → opens
 * the lead inside the Leads tab.
 * ─────────────────────────────────────────────────────────────── */
const STL_TRACKER_TAGS = new Set([
  'straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus',
  'straletkd-disqualified','budget-under-100','dq',
  'booked-call','customer'
]);
const STL_POLL_MS    = 90000;
const STL_STORAGE_KEY = 'toc:seen-lead-ids';
let _stlTimer = null;
let _stlSeen  = null;            // Set<string> of lead IDs already known
let _stlInitialized = false;

function stlLoadSeenFromStorage(){
  try {
    const raw = localStorage.getItem(STL_STORAGE_KEY);
    if (!raw) return null;
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return null;
    return new Set(arr);
  } catch { return null; }
}
function stlSaveSeenToStorage(){
  try {
    // Cap at last 500 ids to avoid runaway storage
    const arr = [..._stlSeen].slice(-500);
    localStorage.setItem(STL_STORAGE_KEY, JSON.stringify(arr));
  } catch {}
}

async function stlRequestPermission(){
  if (!('Notification' in window)) return 'unsupported';
  if (Notification.permission === 'granted') return 'granted';
  if (Notification.permission === 'denied')  return 'denied';
  try { return await Notification.requestPermission(); } catch { return 'denied'; }
}

function stlIsTrackerContact(c){
  return (c.tags || []).some(t => STL_TRACKER_TAGS.has(t));
}

function stlShowToast(contact){
  let wrap = document.getElementById('stl-toast-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'stl-toast-wrap';
    wrap.className = 'stl-toast-wrap';
    document.body.appendChild(wrap);
  }
  const toast = document.createElement('div');
  toast.className = 'stl-toast';
  const meta = [contact.phone, contact.email].filter(Boolean).join(' · ');
  toast.innerHTML = `
    <div class="stl-toast-icon">⚡</div>
    <div class="stl-toast-body">
      <div class="stl-toast-title">Novi lead</div>
      <div class="stl-toast-name">${esc(contact.name||'Nepoznat')}</div>
      ${meta?`<div class="stl-toast-meta">${esc(meta)}</div>`:''}
    </div>
    <div class="stl-toast-close" title="Zatvori">×</div>
  `;
  const dismiss = () => {
    toast.classList.add('leaving');
    setTimeout(()=>toast.remove(), 250);
  };
  toast.querySelector('.stl-toast-close').addEventListener('click', e => { e.stopPropagation(); dismiss(); });
  toast.addEventListener('click', () => {
    dismiss();
    // Best-effort: switch to Leads tab; lead may not yet be in cache
    if (typeof setTab === 'function') setTab('leads');
    setTimeout(() => {
      if (typeof openLeadDetail === 'function' && (cachedLeads||[]).find(l=>l.id===contact.id)) {
        openLeadDetail(contact.id);
      }
    }, 600);
  });
  wrap.appendChild(toast);
  setTimeout(dismiss, 12000);
}

function stlShowDesktopNotification(contact){
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    const meta = [contact.phone, contact.email].filter(Boolean).join(' · ');
    const n = new Notification('⚡ Novi lead', {
      body: `${contact.name||'Nepoznat'}${meta?'\n'+meta:''}`,
      icon: '/thenewioslogov2.png',
      tag: 'toc-new-lead-'+contact.id,
    });
    n.onclick = () => {
      window.focus();
      if (typeof setTab === 'function') setTab('leads');
      n.close();
    };
  } catch (e) { console.warn('Notification failed:', e); }
}

async function stlPoll(){
  try {
    const r = await fetch('/api/ghl-recent', { cache: 'no-store' });
    if (!r.ok) return;
    const json = await r.json();
    const contacts = (json.contacts || []).filter(stlIsTrackerContact);
    if (!_stlSeen) _stlSeen = new Set();

    if (!_stlInitialized) {
      // First poll → baseline: record IDs but don't notify.
      // If localStorage already had a set, this just merges.
      contacts.forEach(c => _stlSeen.add(c.id));
      stlSaveSeenToStorage();
      _stlInitialized = true;
      return;
    }

    const fresh = contacts.filter(c => !_stlSeen.has(c.id));
    fresh.forEach(c => {
      _stlSeen.add(c.id);
      stlShowToast(c);
      stlShowDesktopNotification(c);
    });
    if (fresh.length) stlSaveSeenToStorage();
  } catch (e) {
    // Quiet — network blips shouldn't spam logs
  }
}

/* ─────────────────── LIVE CLOSE CELEBRATION ───────────────────────
 * Subscribes to Supabase Realtime INSERTs on lead_activities where
 * action_type='status' AND new_value='Closed'. Renders a celebration
 * banner with the lead name + which rep closed it. Visible for ~10s,
 * dismissable, and works across all open browser tabs.
 *
 * Requires Realtime enabled for lead_activities in the Supabase
 * dashboard (Database → Replication → toggle on). Falls back silently
 * if Realtime is disabled.
 * ─────────────────────────────────────────────────────────────── */
let _closeChannel = null;
function startCloseCelebrations(){
  if (_closeChannel || !sb || !sb.channel) return;
  try {
    _closeChannel = sb.channel('toc-closes')
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'lead_activities',
        filter: 'action_type=eq.status'
      }, async (payload) => {
        const row = payload?.new;
        if (!row || row.new_value !== 'Closed') return;
        // Look up lead name + rep
        let leadName = 'Lead', rep = '';
        try {
          const { data } = await sb.from('ghl_leads')
            .select('name,assigned_to').eq('id', row.lead_id).single();
          if (data) {
            leadName = data.name || 'Lead';
            rep = data.assigned_to || (row.actor_email||'').split('@')[0] || '';
          }
        } catch {}
        showCloseCelebration(leadName, rep);
      })
      .subscribe();
  } catch (e) { /* realtime not available */ }
}

function showCloseCelebration(leadName, rep){
  const wrap = document.body;
  const repCap = rep ? rep.charAt(0).toUpperCase() + rep.slice(1) : '';
  const banner = document.createElement('div');
  banner.className = 'close-celebrate';
  banner.innerHTML = `
    <div class="cc-emoji">🎉</div>
    <div class="cc-text">
      <div class="cc-title">CLOSED!</div>
      <div class="cc-sub">${repCap?esc(repCap)+' zatvorio ':''}<strong>${esc(leadName)}</strong></div>
    </div>
    <div class="cc-close">×</div>
  `;
  wrap.appendChild(banner);
  // Confetti dots
  for (let i = 0; i < 14; i++) {
    const dot = document.createElement('span');
    dot.className = 'cc-confetti';
    dot.style.left  = Math.random()*100 + '%';
    dot.style.background = ['#f43f5e','#22c55e','#E8720C','#a855f7','#eab308','#f97316'][i%6];
    dot.style.animationDelay = (Math.random()*.4) + 's';
    dot.style.animationDuration = (1.2 + Math.random()*1.5) + 's';
    banner.appendChild(dot);
  }
  const dismiss = () => { banner.classList.add('leaving'); setTimeout(() => banner.remove(), 350); };
  banner.querySelector('.cc-close').onclick = dismiss;
  setTimeout(dismiss, 10000);
}

/* ─────────────────── KEYBOARD SHORTCUTS ───────────────────────────
 * '/'         → focus the Leads search input (Gmail-style).
 * ArrowLeft/ArrowRight (when detail panel open) → prev/next lead.
 * Esc         → close detail panel (handled elsewhere).
 * ─────────────────────────────────────────────────────────────── */
let _kbShortcutsInstalled = false;
function installKeyboardShortcuts(){
  if (_kbShortcutsInstalled) return;
  _kbShortcutsInstalled = true;
  document.addEventListener('keydown', (e) => {
    const tag = (e.target?.tagName || '').toLowerCase();
    const inField = ['input','textarea','select'].includes(tag) || e.target?.isContentEditable;
    // '/' to focus search
    if (e.key === '/' && !inField && !e.metaKey && !e.ctrlKey) {
      const search = document.querySelector('.leads-search');
      if (search) { e.preventDefault(); search.focus(); search.select?.(); }
      return;
    }
    // Arrow nav when detail panel is open
    if (currentLeadId && (e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !inField) {
      const { leads } = computeLeads();
      const idx = leads.findIndex(l => l.id === currentLeadId);
      if (idx === -1) return;
      const next = e.key === 'ArrowRight'
        ? (idx + 1 < leads.length ? leads[idx+1] : null)
        : (idx > 0 ? leads[idx-1] : null);
      if (next) { e.preventDefault(); openLeadDetail(next.id); }
    }
  });
}

/* ─────────────────── DUPLICATE DETECTOR ───────────────────────────
 * Scans cachedLeads for leads sharing the same phone or email.
 * Returns groups of 2+ leads with the matching identifier.
 * ─────────────────────────────────────────────────────────────── */
function findLeadDuplicates(){
  const byPhone = new Map(), byEmail = new Map();
  (cachedLeads||[]).forEach(l => {
    if (l.phone) {
      const p = String(l.phone).replace(/[^\d]/g,'');
      if (p.length >= 7) {
        if (!byPhone.has(p)) byPhone.set(p, []);
        byPhone.get(p).push(l);
      }
    }
    if (l.email) {
      const e = String(l.email).trim().toLowerCase();
      if (e) {
        if (!byEmail.has(e)) byEmail.set(e, []);
        byEmail.get(e).push(l);
      }
    }
  });
  const groups = [];
  byPhone.forEach((v,k) => { if (v.length > 1) groups.push({ type:'phone', key:k, leads:v }); });
  byEmail.forEach((v,k) => { if (v.length > 1) groups.push({ type:'email', key:k, leads:v }); });
  return groups;
}

/* ─────────────────── SNOOZE ──────────────────────────────────────
 * Stores per-lead "hide until" date in localStorage. Snoozed leads
 * are hidden from the default leads view unless explicitly toggled.
 *
 * Requires this Supabase SQL (optional — falls back to localStorage):
 *   alter table ghl_leads add column if not exists snoozed_until date;
 * ─────────────────────────────────────────────────────────────── */
const SNOOZE_KEY = 'toc:snoozed';
let leadsShowSnoozed = false;
function loadSnoozeMap(){
  try { return JSON.parse(localStorage.getItem(SNOOZE_KEY) || '{}'); }
  catch { return {}; }
}
function saveSnoozeMap(m){ localStorage.setItem(SNOOZE_KEY, JSON.stringify(m)); }
function isSnoozed(leadId){
  const today = new Date().toISOString().slice(0,10);
  const m = loadSnoozeMap();
  return m[leadId] && m[leadId] > today;
}
async function snoozeLead(leadId, untilDate){
  const m = loadSnoozeMap();
  if (untilDate) m[leadId] = untilDate; else delete m[leadId];
  saveSnoozeMap(m);
  // Try to persist to Supabase too (no-op if column missing)
  try { await sb.from('ghl_leads').update({ snoozed_until: untilDate || null }).eq('id', leadId); }
  catch {}
  logActivity(leadId, 'snooze', null, untilDate || null);
  refreshLeadRows();
  if (currentLeadId === leadId) openLeadDetail(leadId);
}
function toggleShowSnoozed(){
  leadsShowSnoozed = !leadsShowSnoozed;
  renderLeads(cachedLeads);
}

function toggleSmartView(){
  leadsSmartView = !leadsSmartView;
  if (leadsSmartView) { leadsShowFollowUp = false; leadsShowStale = false; }
  renderLeads(cachedLeads);
}

function stlStart(){
  if (_stlTimer) return;
  _stlSeen = stlLoadSeenFromStorage() || new Set();
  _stlInitialized = _stlSeen.size > 0;  // if we have history, treat next fresh-only
  stlRequestPermission();  // fire-and-forget
  stlPoll();               // immediate first poll
  _stlTimer = setInterval(stlPoll, STL_POLL_MS);
  // Re-poll when tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') stlPoll();
  });
}

async function loadLeadCounts(){
  const [allR,qR,dqR,bR,cR]=await Promise.all([
    sb.from('ghl_leads').select('id',{count:'exact',head:true}),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).overlaps('tags',['straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus']),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).overlaps('tags',['straletkd-disqualified','budget-under-100','dq']),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).overlaps('tags',['booked-call']),
    sb.from('ghl_leads').select('id',{count:'exact',head:true}).overlaps('tags',['customer']),
  ]);
  return{all:allR.count||0,qualified:qR.count||0,disqualified:dqR.count||0,booked:bR.count||0,customer:cR.count||0};
}

function mapContact(c, lead_type){
  const cf={};
  (c.customFields||[]).forEach(f=>{if(GHL_CF[f.id])cf[GHL_CF[f.id]]=f.value;});
  return{
    id:c.id, lead_type,
    tags:c.tags||[],
    name:[c.firstName,c.lastName].filter(Boolean).join(' ')||'Nepoznat',
    email:c.email||null, phone:c.phone||null,
    instagram:cf.instagram||null, experience:cf.experience||null,
    pain_point:cf.pain_point||null, knowledge:cf.knowledge||null,
    time_frame:cf.time_frame||null, qualification:cf.qualification||null,
    date_added:c.dateAdded||new Date().toISOString(),
    synced_at:new Date().toISOString(),
    utm_source:(c.attributions||[]).find(a=>a.isFirst)?.utmSource||(c.attributions||[])[0]?.utmSource||null,
    utm_medium:(c.attributions||[]).find(a=>a.isFirst)?.utmMedium||(c.attributions||[])[0]?.utmMedium||null,
    utm_campaign:(c.attributions||[]).find(a=>a.isFirst)?.utmCampaign||(c.attributions||[])[0]?.utmCampaign||null,
    utm_content:(c.attributions||[]).find(a=>a.isFirst)?.utmContent||(c.attributions||[])[0]?.utmContent||null,
  };
}

async function syncLeadsFromGHL(){
  if(syncLeadsFromGHL._busy) return;   // ignore overlapping syncs (no duplicate full GHL pulls)
  syncLeadsFromGHL._busy = true;
  const btn=document.querySelector('.sync-btn');
  if(btn)btn.classList.add('spinning');
  try{
    const res=await fetch('/api/ghl-leads');
    if(!res.ok)throw new Error(`API HTTP ${res.status}`);
    const json=await res.json();
    if(json.error)throw new Error(json.error);
    // Merge all contacts by ID — tags stored from GHL, lead_type = highest priority match
    const seen=new Map();
    // Highest-priority bucket wins the lead_type pill: customer > booked > qualified > disqualified.
    const priority=['customer','booked','qualified','disqualified'];
    [
      ...(json.customer||[]).map(c=>mapContact(c,'customer')),
      ...(json.booked||[]).map(c=>mapContact(c,'booked')),
      ...(json.qualified||[]).map(c=>mapContact(c,'qualified')),
      ...(json.disqualified||[]).map(c=>mapContact(c,'disqualified')),
    ].forEach(r=>{
      const existing=seen.get(r.id);
      if(!existing||priority.indexOf(r.lead_type)<priority.indexOf(existing.lead_type)) seen.set(r.id,r);
    });
    const rows=[...seen.values()];
    // Fetch ALL existing leads' id+tags ONCE — reused for BOTH the tag
    // merge (so manually-added tracker tags aren't wiped when GHL omits
    // them) AND the stale reconciliation below. Replaces the old per-chunk
    // tag SELECTs (N/200 sequential round-trips) with a single query.
    const {data:existing}=await sb.from('ghl_leads').select('id, tags').limit(20000);
    const existingTags=new Map((existing||[]).map(r=>[r.id, r.tags||[]]));
    rows.forEach(r=>{
      const prev=existingTags.get(r.id)||[];
      r.tags=[...new Set([...prev, ...(r.tags||[])])];
    });
    if(rows.length){
      // Upsert in chunks to avoid request-size limits
      const CHUNK=500;
      for(let i=0;i<rows.length;i+=CHUNK){
        const {error}=await sb.from('ghl_leads').upsert(rows.slice(i,i+CHUNK),{onConflict:'id',ignoreDuplicates:false});
        if(error){console.error('Upsert error:',error);break;}
      }
    }
    // Full reconciliation: delete any Supabase rows no longer in GHL.
    // EXCEPTION: synthetic IDs starting with 'webinar-' or 'manual-' are
    // tracker-only leads (CSV-imported attendees who aren't in GHL yet) —
    // skip them so the import survives the sync. Deletes run in parallel.
    const currentIds=new Set(rows.map(r=>r.id));
    const stale=[...existingTags.keys()]
      .filter(id=>!currentIds.has(id))
      .filter(id=>!/^(webinar|manual)-/.test(id));  // keep CSV imports
    if(stale.length){
      const CHUNK=200, delChunks=[];
      for(let i=0;i<stale.length;i+=CHUNK) delChunks.push(stale.slice(i,i+CHUNK));
      await Promise.all(delChunks.map(c=>sb.from('ghl_leads').delete().in('id',c)));
      console.log(`Sync removed ${stale.length} stale leads not in GHL anymore.`);
    }
    await renderLeadsSection();
    // After GHL sync: auto-distribute unassigned leads round-robin
    autoAssignUnassigned().then(r => showRoundRobinToast(r));
    // Reconcile sheet → CRM Closed status
    syncClosedFromSheet({force:true}).then(r => showSheetSyncToast(r));
    // Auto-recycle stale Follow-Up leads back to Novi
    autoRecycleFollowUps().then(r => showRecycleToast(r));
  }catch(e){
    console.error('GHL sync error:',e);
    const msg='Ne mogu da sinhronizujem sa GHL: '+e.message;
    document.getElementById('mainContent').insertAdjacentHTML('afterbegin',

// For the currently loaded leads, fetch the most recent activity per
// lead (call outcome, status change, assign, etc.) so the UI can
// show "Poslednja akcija: Javio se · pre 2h" without opening the panel.
async function attachLastActivities(leads){
  const ids = (leads||[]).map(l => l.id).filter(Boolean);
  if (!ids.length) return false;
  // Query in chunks to avoid URL length issues
  const CHUNK = 200;
  const map = new Map();
  for (let i = 0; i < ids.length; i += CHUNK) {
    const slice = ids.slice(i, i + CHUNK);
    const { data, error } = await sb.from('lead_activities')
      .select('lead_id, action_type, new_value, old_value, actor_email, created_at')
      .in('lead_id', slice)
      .order('created_at', { ascending: false })
      .limit(2000);
    if (error || !data) continue;
    data.forEach(a => {
      // First row per lead_id wins (already sorted DESC)
      if (!map.has(a.lead_id)) map.set(a.lead_id, a);
    });
  }
  if (!map.size) return false;
  leads.forEach(l => { l.last_activity = map.get(l.id) || null; });
  return true;
}

// Leads acted on this session — kept visible in the list regardless of
// active filters (Smart / Follow-up / Stale / tag / assign / snooze),
// so the rep can always see what they marked. Cleared only on full
// page reload or by manually clicking the lead away.
const _recentActedLeads = new Set();
function markRecentlyActed(leadId){
  _recentActedLeads.add(leadId);
  // Brief green pulse so the rep notices the badge update
  setTimeout(() => {
    const tr = [...document.querySelectorAll('#leadsBody tr')]
      .find(t => (t.getAttribute('onclick')||'').includes(leadId));
    if (tr) {
      tr.classList.remove('row-flash'); void tr.offsetWidth;  // restart anim
      tr.classList.add('row-flash');
    }
  }, 30);
}
function isRecentlyActed(leadId){ return _recentActedLeads.has(leadId); }

// Optimistically update a lead's last_activity field locally so the
// row badge refreshes immediately without waiting for re-fetch.
function setLocalLastActivity(leadId, actionType, newValue, oldValue = null){
  const lead = (cachedLeads||[]).find(l => l.id === leadId);
  if (!lead) return;
  lead.last_activity = {
    lead_id: leadId,
    action_type: actionType,
    new_value: newValue,
    old_value: oldValue,

// Formats a lead_activities row into a compact UI badge: { label, icon, color }
function lastActionBadge(act){
  if (!act) return null;
  const ICON = {
    'call':     { 'Javio se':'📞','Nije javio':'⏱','Govorna pošta':'🎙','Pogrešan broj':'❌' },
    'status':   { 'Novi':'🆕','Follow Up':'🔁','Closed':'✅','DQ':'❌' },
    'assign':   '👤',
    'followup': '📅',
    'note':     '📝',
    'deal':     '💰',
    'snooze':   '😴',
  };
  let icon = '•', label = act.new_value || act.action_type;
  if (act.action_type === 'call') {
    icon = ICON.call[act.new_value] || '📞';
    label = act.new_value || 'Poziv';
  } else if (act.action_type === 'status') {
    icon = ICON.status[act.new_value] || '🔄';
    label = `${act.new_value || ''}`;
  } else if (act.action_type === 'assign') {
    icon = '👤';
    label = act.new_value ? `→ ${act.new_value.charAt(0).toUpperCase()+act.new_value.slice(1)}` : 'Unassign';
  } else if (act.action_type === 'followup') {
    icon = '📅';
    label = act.new_value ? `FU ${act.new_value}` : 'FU obrisan';
  } else if (act.action_type === 'note') {
    icon = '📝';
    label = 'Beleška';
  } else if (act.action_type === 'deal') {
    icon = '💰';
    label = 'Paket';
  } else if (act.action_type === 'snooze') {
    icon = '😴';
    label = act.new_value ? `Snooze ${act.new_value}` : 'Otkazan';
  }
  // Color hint
  let cls = 'la-default';
  if (act.action_type === 'call') {
    if (act.new_value === 'Javio se') cls = 'la-good';
    else if (act.new_value === 'Pogrešan broj') cls = 'la-bad';
    else cls = 'la-meh';
  } else if (act.action_type === 'status') {
    if (act.new_value === 'Closed') cls = 'la-good';
    else if (act.new_value === 'DQ') cls = 'la-bad';
    else if (act.new_value === 'Follow Up') cls = 'la-warm';
  }
  return { icon, label, cls, when: timeAgoSr(act.created_at), actor: (act.actor_email||'').split('@')[0] };
}

async function loadCampaignData(){
  const {data,error}=await sb.from('ghl_leads')
    .select('utm_campaign,utm_content,utm_source,utm_medium,status,deal,lead_type,tags')
    .overlaps('tags',['straletkd-qualified','budget-100-300','budget-300-1000','budget-1000-plus','straletkd-disqualified','budget-under-100','booked-call','customer'])
    .limit(5000);
  if(error||!data) return [];
  const isId=v=>v&&/^\d{10,}$/.test(v.trim());
  const fmt=v=>!v||isId(v)?null:v;
  const fmtCampaign=v=>!v||isId(v)?'Nepoznata kampanja':v.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const map={};
  data.forEach(r=>{
    const content=fmt(r.utm_content);
    const hasUtm=!!(r.utm_campaign||r.utm_content||r.utm_source);
    const key=hasUtm?(content||'').toLowerCase()||'no-content':'organic';
    if(!map[key]) map[key]={
      key,
      content:hasUtm?(content||'Nepoznat oglas'):'Organic / Direct',
      campaign:hasUtm?fmtCampaign(r.utm_campaign):'',
      source:(r.utm_source||'').toLowerCase().replace(/^ig$/,'instagram'),
      leads:0, closes:0, revenue: 0
    };
    map[key].leads++;
    if(r.status==='Closed') {
      map[key].closes++;
      const price = r.deal && DEAL_PRICES[r.deal];
      if (price) map[key].revenue += price;
    }
  });
  return Object.values(map).sort((a,b)=>b.leads-a.leads);
}

function exportLeadsCSV(){
  const {leads} = computeLeads();

  const cols = ['name','email','phone','instagram','status','lead_type','assigned_to','follow_up_date','date_added','tags','deal','notes'];
  const head = cols.join(',');
  const escCsv = v => {
    if (v == null) return '';
    const s = Array.isArray(v) ? v.join(';') : String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const body = leads.map(l => cols.map(c => escCsv(l[c])).join(',')).join('\n');
  const csv = head + '\n' + body;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);

  a.download = `leads_${leadsSubTab}_${stamp}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function pipelineValue(leads){
  let openValue = 0, closedValue = 0;
  (leads||[]).forEach(l => {
    if (!l.deal || !DEAL_PRICES[l.deal]) return;
    const price = DEAL_PRICES[l.deal];
    if (l.status === 'Closed') closedValue += price;
    else if (l.status !== 'DQ') openValue += price;
  });
  return { open: openValue, closed: closedValue };
}

// Computes the searched + assign-filtered lead list and the filter counts.
function computeLeads(){
  const q=leadsSearch.trim().toLowerCase();
  const all=cachedLeads||[];
  // Pin recently-acted leads — they stay visible for 30s even if active
  // filters would normally hide them, so the rep sees their click reflected.
  const keepAlways = l => isRecentlyActed(l.id);
  let searched=q ? all.filter(l=>[l.name,l.email,l.phone,l.instagram].some(v=>v&&v.toLowerCase().includes(q))) : all;
  if(leadsShowFollowUp){
    const todayStr=new Date().toISOString().slice(0,10);
    searched=searched.filter(l=>keepAlways(l)||(l.follow_up_date===todayStr&&l.status!=='Closed'&&l.status!=='DQ'));
  }
  if(leadsTagFilter){
    searched=searched.filter(l=>keepAlways(l)||(Array.isArray(l.tags)&&l.tags.includes(leadsTagFilter)));
  }
  if(!leadsShowSnoozed){
    searched=searched.filter(l=>keepAlways(l)||!isSnoozed(l.id));
  }
  if(leadsShowStale){
    // Stale = open AND created >14d ago AND no upcoming follow-up
    const fourteenDaysAgo=new Date(); fourteenDaysAgo.setDate(fourteenDaysAgo.getDate()-14);
    const cutoffIso=fourteenDaysAgo.toISOString();
    const cutoffDay=fourteenDaysAgo.toISOString().slice(0,10);
    searched=searched.filter(l=>{
      if (keepAlways(l)) return true;
      if (l.status==='Closed'||l.status==='DQ') return false;
      if (l.date_added && l.date_added >= cutoffIso) return false;
      // If they have a future or recent follow-up, not stale
      if (l.follow_up_date && l.follow_up_date >= cutoffDay) return false;
      return true;
    });
  }
  let leads=searched;
  if(leadsFilter==='mateja')        leads=searched.filter(l=>keepAlways(l)||l.assigned_to==='mateja');
  else if(leadsFilter==='dusica')   leads=searched.filter(l=>keepAlways(l)||l.assigned_to==='dusica');
  else if(leadsFilter==='unassigned') leads=searched.filter(l=>keepAlways(l)||!l.assigned_to);
  if(leadsSmartView){
    // Hide cold leads (score < 45) and sort hottest-first. Pinned leads pass through.
    leads = leads
      .map(l => ({ l, s: leadScore(l) }))
      .filter(x => keepAlways(x.l) || (x.s >= 45 && x.l.status !== 'Closed' && x.l.status !== 'DQ'))
      .sort((a, b) => b.s - a.s)
      .map(x => x.l);
  } else {
    // Default sort: leads WITH phones come first (they're actionable for
    // call / WhatsApp). Within each phone-group, preserve the existing
    // date_added DESC order from the DB query.
    leads = leads.slice().sort((a, b) => {
      const aHas = a.phone ? 0 : 1;
      const bHas = b.phone ? 0 : 1;
      return aHas - bHas;
    });
  }
  const fc={
    all:searched.length,
    mateja:searched.filter(l=>l.assigned_to==='mateja').length,
    dusica:searched.filter(l=>l.assigned_to==='dusica').length,
    unassigned:searched.filter(l=>!l.assigned_to).length,
  };
  return {searched,leads,fc};
}

function toggleLeadSelection(id, checked){
  if (checked) selectedLeadIds.add(id);
  else selectedLeadIds.delete(id);
  // Toggle row styling without full re-render
  document.querySelectorAll('#leadsBody tr').forEach(tr => {
    const chk = tr.querySelector('.ltr-chk');
    if (chk) tr.classList.toggle('ltr-selected', chk.checked);
  });
  renderBulkBar();
}

function toggleSelectAll(checked){
  const {leads} = computeLeads();
  if (checked) leads.forEach(l => selectedLeadIds.add(l.id));
  else leads.forEach(l => selectedLeadIds.delete(l.id));
  refreshLeadRows();
  renderBulkBar();
}

function clearLeadSelection(){
  selectedLeadIds.clear();
  refreshLeadRows();
  renderBulkBar();
}

function renderBulkBar(){
  let bar = document.getElementById('bulkBar');
  if (!selectedLeadIds.size) {
    if (bar) bar.classList.remove('show');
    return;
  }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'bulkBar';
    bar.className = 'bulk-bar';
    document.body.appendChild(bar);
  }
  bar.innerHTML = `
    <div class="bulk-count">${selectedLeadIds.size} selektovano</div>
    <div class="bulk-sep"></div>
    <div class="bulk-group">
      <span class="bulk-lbl">Dodeli</span>

async function bulkAssign(member){
  const ids = [...selectedLeadIds];
  if (!ids.length) return;
  const { error } = await sb.from('ghl_leads').update({ assigned_to: member }).in('id', ids);
  if (error) { alert('Greška: '+error.message); return; }
  // Log each + optimistic local last_activity
  ids.forEach(id => {
    const lead = cachedLeads.find(l=>l.id===id);
    if (lead) {
      const old = lead.assigned_to||null;
      logActivity(id, 'assign', old, member);
      lead.assigned_to = member;
      setLocalLastActivity(id, 'assign', member, old);
    }
  });
  refreshLeadRows();
}

async function bulkStatus(status){
  const ids = [...selectedLeadIds];
  if (!ids.length) return;
  const { error } = await sb.from('ghl_leads').update({ status }).in('id', ids);
  if (error) { alert('Greška: '+error.message); return; }
  ids.forEach(id => {
    const lead = cachedLeads.find(l=>l.id===id);
    if (lead) {
      const old = lead.status||'Novi';
      logActivity(id, 'status', old, status);
      lead.status = status;
      setLocalLastActivity(id, 'status', status, old);
    }
  });
  refreshLeadRows();
}

async function bulkFollowUp(date){
  const ids = [...selectedLeadIds];
  if (!ids.length) return;
  const val = date || null;
  const { error } = await sb.from('ghl_leads').update({ follow_up_date: val }).in('id', ids);
  if (error) { alert('Greška: '+error.message); return; }
  ids.forEach(id => {
    const lead = cachedLeads.find(l=>l.id===id);
    if (lead) {
      const old = lead.follow_up_date||null;
      logActivity(id, 'followup', old, val);
      lead.follow_up_date = val;
      setLocalLastActivity(id, 'followup', val, old);
    }
  });
  refreshLeadRows();
}

  const {leads,fc}=computeLeads();

  const bar=document.getElementById('leadsFilterBar');
  if(bar){

      b.classList.toggle('active',f===leadsFilter);
      if(f==='all') b.textContent=`Svi (${fc.all})`;
    });
  }
}

/* ─── Lead-detail booking block: fetch this contact's GHL appointments ─── */
async function renderLeadBookings(elId, contactId){
  const host=document.getElementById(elId);
  if(!host) return;
  try{
    const now=Date.now();
    const start=now-180*864e5, end=now+180*864e5;
    const r=await fetch(`/api/ghl-appointments?contactId=${encodeURIComponent(contactId)}&start=${start}&end=${end}`);
    const j=await r.json().catch(()=>({}));
    if(!r.ok){
      host.innerHTML=`<div class="ldp-appt-empty">Kalendar nedostupan${j&&j.hint?` — ${esc(j.hint)}`:''}</div>`;
      return;
    }
    const evs=(j.events||[]).filter(e=>!e.deleted);
    if(!evs.length){ host.innerHTML='<div class="ldp-appt-empty">Nema zakazanih poziva.</div>'; return; }
    // newest first
    evs.sort((a,b)=>String(b.startTime).localeCompare(String(a.startTime)));
    host.innerHTML=evs.map(renderApptRow).join('');
  }catch(e){
    host.innerHTML='<div class="ldp-appt-empty">Greška pri učitavanju poziva.</div>';
  }
}

function renderApptRow(e){
  const start=new Date(e.startTime), end=e.endTime?new Date(e.endTime):null;
  const dow=start.toLocaleDateString('sr-RS',{weekday:'short'});
  const day=start.toLocaleDateString('sr-RS',{day:'numeric',month:'short'});
  const t1=start.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'});
  const t2=end?end.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'}):'';
  const st=String(e.appointmentStatus||e.appoinmentStatus||'').toLowerCase();
  const map={confirmed:{l:'Zakazano',c:'a-booked'},new:{l:'Zakazano',c:'a-booked'},booked:{l:'Zakazano',c:'a-booked'},showed:{l:'Došao',c:'a-showed'},noshow:{l:'Nije došao',c:'a-noshow'},cancelled:{l:'Otkazano',c:'a-cancel'},invalid:{l:'Nevažeće',c:'a-cancel'}};
  const s=map[st]||{l:st||'—',c:'a-booked'};
  const addr=e.address||'';
  const isUrl=/^https?:\/\//.test(addr);
  const upcoming=start.getTime()>Date.now() && (s.c==='a-booked');
  return `<div class="ldp-appt">
    <div class="ldp-appt-date ${upcoming?'up':''}"><span class="d-dow">${esc(dow)}</span><span class="d-day">${esc(day)}</span></div>
    <div class="ldp-appt-main">
      <div class="ldp-appt-title">${esc(e.calendarName||e.title||'Poziv')}</div>
      <div class="ldp-appt-time">${esc(t1)}${t2?'–'+esc(t2):''}</div>
      ${addr?`<div class="ldp-appt-loc">${isUrl?`<a href="${esc(addr)}" target="_blank" rel="noopener">🔗 Join Meet</a>`:`📍 ${esc(addr)}`}</div>`:''}
    </div>
    <span class="ldp-appt-status ${s.c}">${esc(s.l)}</span>
  </div>`;
}

/* Delete a lead — permanently removes it from GHL (so the sync won't re-add it)
   and from the tracker DB. Synthetic (webinar-/manual-) leads are tracker-only. */
async function deleteLead(id){
  const lead = (cachedLeads||[]).find(l => l.id === id);
  const name = (lead && lead.name) ? lead.name : 'ovaj lead';
  const synthetic = /^(webinar|manual)-/.test(id);
  const msg = synthetic
    ? `Obrisati "${name}" iz trackera? Ovo se ne može poništiti.`
    : `Obrisati "${name}"?\n\nLead će biti TRAJNO obrisan iz trackera I iz GHL-a (kontakt, termini, sve). Ovo se ne može poništiti.`;
  if (!confirm(msg)) return;

  // 1) GHL first — otherwise the next sync would re-add it (skip tracker-only leads)
  if (!synthetic) {
    try {
      const r = await fetch('/api/ghl-delete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contactId: id })
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        alert('Greška pri brisanju iz GHL-a: ' + (j.error || ('HTTP ' + r.status)) + '\nLead NIJE obrisan.');
        return;
      }
    } catch (e) { alert('Greška pri brisanju iz GHL-a: ' + e.message + '\nLead NIJE obrisan.'); return; }
  }

  // 2) tracker DB (lead_activities cascade-delete via FK)
  const { error } = await sb.from('ghl_leads').delete().eq('id', id);
  if (error) { alert('Greška pri brisanju iz trackera: ' + error.message); return; }

  // 3) UI
  cachedLeads = (cachedLeads || []).filter(l => l.id !== id);
  closeLeadDetail();
  refreshLeadRows();
}

async function assignLeadPanel(id,member){
  const lead = (cachedLeads||[]).find(l => l.id === id);
  if (!lead) return;
  const oldVal = lead.assigned_to || null;
  const newVal = lead.assigned_to === member ? null : member;
  const { error } = await sb.from('ghl_leads').update({ assigned_to: newVal }).eq('id', id);
  if (error) return;
  lead.assigned_to = newVal;
  logActivity(id, 'assign', oldVal, newVal);
  setLocalLastActivity(id, 'assign', newVal, oldVal);
  // Partial UI updates instead of full panel re-render
  if (currentLeadId === id) updatePanelAssignButtons(newVal);
  refreshLeadRows();
  // Refresh activity timeline
  if (currentLeadId === id) {
    setTimeout(() => renderLeadActivityInto('ldpActivityList', id), 80);
  }
}
